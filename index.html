<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="호흡 훈련">
<meta name="theme-color" content="#1a4a8a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-152.png">
<title>호흡 훈련</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f5f5f5;--bg3:#eee;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --info-bg:#e6f1fb;--info:#185fa5;--info-bd:#85b7eb;
  --success-bg:#eaf3de;--success:#3b6d11;--success-bd:#97c459;
  --warning-bg:#faeeda;--warning:#854f0b;--warning-bd:#ef9f27;
  --danger-bg:#fcebeb;--danger:#a32d2d;--danger-bd:#f09595;
  --bd:rgba(0,0,0,0.12);--bd2:rgba(0,0,0,0.22);
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;--info-bg:#0c2540;--info:#85b7eb;--info-bd:#378add;--success-bg:#1a2e0a;--success:#97c459;--success-bd:#639922;--warning-bg:#2a1e00;--warning:#ef9f27;--warning-bd:#ba7517;--danger-bg:#2a0a0a;--danger:#f09595;--danger-bd:#e24b4a;--bd:rgba(255,255,255,0.12);--bd2:rgba(255,255,255,0.22);}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;overflow-x:hidden;}
.wrap{padding:env(safe-area-inset-top,16px) 1rem 0;max-width:520px;margin:0 auto;position:relative;}
.app-header{text-align:center;padding:10px 0 6px;margin-bottom:10px;}
.app-title{font-size:17px;font-weight:700;color:var(--text);}
.tabs{display:flex;margin-bottom:10px;border:0.5px solid var(--bd2);border-radius:var(--r);overflow:hidden;}
.tab{flex:1;padding:8px 4px;font-size:13px;font-weight:500;background:transparent;border:none;cursor:pointer;color:var(--text2);font-family:inherit;}
.tab.active{background:var(--info-bg);color:var(--info);}
.tab:hover:not(.active){background:var(--bg2);}
.user-bar{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:var(--r);padding:8px 12px;margin-bottom:14px;}
.uba{width:28px;height:28px;border-radius:50%;background:var(--info-bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--info);flex-shrink:0;overflow:hidden;}
.uba img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.ubn{font-size:13px;font-weight:500;color:var(--text);}
.ubd{width:1px;height:14px;background:var(--bd2);flex-shrink:0;}
.ubi{display:flex;flex-direction:column;align-items:center;}
.ubv{font-size:13px;font-weight:500;color:var(--text);}
.ubl{font-size:10px;color:var(--text2);}
.ubb{font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;}
.page{display:none;}.page.active{display:block;}
.pp{padding-bottom:1.5rem;}
.sp{background:var(--bg2);border-radius:var(--rl);padding:1.25rem;margin-bottom:1.25rem;display:none;}
.sp.open{display:block;}
.mt{display:flex;margin-bottom:1rem;border:0.5px solid var(--bd2);border-radius:var(--r);overflow:hidden;}
.mb{flex:1;padding:8px;font-size:13px;font-weight:500;background:transparent;border:none;cursor:pointer;color:var(--text2);font-family:inherit;}
.mb.active{background:var(--info-bg);color:var(--info);}
.pg{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;}
.pc{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--r);padding:10px 6px;text-align:center;cursor:pointer;}
.pc:hover,.pc.act{border-color:var(--info-bd);background:var(--info-bg);}
.pcn{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.pc.act .pcn{color:var(--info);}
.pcs{font-size:10px;color:var(--text2);}
.pc.act .pcs{color:var(--info);}
.pe{background:var(--bg3);border-radius:var(--r);padding:1rem;margin-top:10px;}
.pni{font-size:13px;padding:6px 10px;background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--r);color:var(--text);font-family:inherit;width:100%;margin-bottom:10px;}
.pni:focus{outline:none;border-color:var(--info-bd);}
.row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}.row:last-child{margin-bottom:0;}
.lbl{font-size:14px;color:var(--text2);width:82px;flex-shrink:0;}
.row input[type=range]{flex:1;accent-color:var(--info);}
.val{font-size:14px;font-weight:500;color:var(--text);width:44px;text-align:right;flex-shrink:0;}
.div{height:0.5px;background:var(--bd);margin:14px 0;}
.sr{display:flex;align-items:center;justify-content:space-between;}
.sl{font-size:14px;color:var(--text2);}
.st{display:flex;border:0.5px solid var(--bd);border-radius:var(--r);overflow:hidden;}
.st button{padding:6px 14px;font-size:12px;border:none;background:transparent;color:var(--text2);font-family:inherit;cursor:pointer;}
.st button.on{background:var(--info-bg);color:var(--info);}
.tb{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.tbl{font-size:12px;color:var(--text2);flex:1;margin-right:8px;}
.tbr{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.ib{display:flex;align-items:center;gap:5px;padding:7px 12px;font-size:13px;border-radius:var(--r);border:0.5px solid var(--bd);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;}
.ib:hover{background:var(--bg2);}
.ib svg{width:14px;height:14px;flex-shrink:0;}
.ib.acfg{border-color:var(--info-bd);color:var(--info);background:var(--info-bg);}
.ib.ascr{border-color:var(--warning-bd);color:var(--warning);background:var(--warning-bg);}
.cw{display:flex;flex-direction:column;align-items:center;padding:1.25rem 0 0.75rem;gap:12px;}
.co{position:relative;width:220px;height:220px;}
.cbg{width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,215,0,0.07)0%,transparent 70%);position:absolute;}
.ci{width:110px;height:110px;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(1);transition:transform 0.12s linear;}
.pl{font-size:24px;font-weight:600;color:var(--text);}
.tl{font-size:14px;color:var(--text2);}
.pb{width:100%;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-top:2px;}
.pf{height:100%;background:var(--info);width:0%;transition:width 0.1s linear;border-radius:2px;}
.sg{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:0.75rem 0 1rem;}
.st2{background:var(--bg2);border-radius:var(--r);padding:10px;text-align:center;}
.sn{font-size:18px;font-weight:600;color:var(--text);}
.sl2{font-size:11px;color:var(--text2);margin-top:2px;}
.br{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
button{font-size:14px;padding:10px 24px;border-radius:var(--r);border:0.5px solid var(--bd);background:transparent;color:var(--text);cursor:pointer;font-family:inherit;}
button:hover{background:var(--bg2);}
button:active{transform:scale(0.98);}
.bp{background:var(--info-bg);color:var(--info);border-color:var(--info-bd);}
.bp:hover{opacity:0.85;}
.bd2{color:var(--danger);border-color:var(--danger-bd);}
.bd2:hover{background:var(--danger-bg);}
.bs2{display:flex;align-items:center;gap:6px;background:var(--success-bg);color:var(--success);border-color:var(--success-bd);}
.bs2:hover{opacity:0.85;}
.bsm{padding:6px 12px;font-size:12px;}
.smg{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px;}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.ct{font-size:16px;font-weight:600;color:var(--text);}
.cg{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;margin-bottom:14px;}
.dn{font-size:11px;color:var(--text2);text-align:center;padding:4px 0;font-weight:500;}
.cc{aspect-ratio:1;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:0.5px solid transparent;gap:2px;}
.cc:hover{background:var(--bg2);}
.cc.empty{cursor:default;pointer-events:none;}
.cn{font-size:13px;color:var(--text);width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.cc.today .cn{background:var(--info-bg);color:var(--info);}
.cc.sel{border:1.5px solid var(--info-bd);}
.dr{display:flex;gap:2px;}.dot{width:5px;height:5px;border-radius:50%;}
.dg{background:#639922;}.da{background:#BA7517;}
.dp{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:1.25rem;}
.dph{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.dpt{font-size:15px;font-weight:600;color:var(--text);}
.xb{width:28px;height:28px;border-radius:50%;border:0.5px solid var(--danger-bd);background:transparent;color:var(--danger);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0;line-height:1;flex-shrink:0;}
.sl3{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.04em;}
.em{font-size:13px;color:var(--text2);padding:0.75rem 0;}
.ti{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--bd);}
.ti:last-child{border-bottom:none;}
.tl2{display:flex;flex-direction:column;gap:3px;}
.tn{font-size:13px;font-weight:500;color:var(--text);}
.ts{font-size:12px;color:var(--text2);}
.bgs{display:flex;gap:6px;}
.bg{font-size:12px;padding:3px 9px;border-radius:var(--r);}
.bbl{background:var(--info-bg);color:var(--info);}
.bgn{background:var(--success-bg);color:var(--success);}
.bga{background:var(--warning-bg);color:var(--warning);}
.cdiv{height:0.5px;background:var(--bd);margin:1rem 0;}
.mb2{background:var(--bg2);border-radius:var(--r);padding:1rem;margin-bottom:10px;font-size:14px;color:var(--text);line-height:1.6;white-space:pre-wrap;word-break:break-all;}
textarea.mi{width:100%;min-height:80px;padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg2);border:0.5px solid var(--bd);border-radius:var(--r);resize:none;line-height:1.5;margin-bottom:8px;}
textarea.mi:focus{outline:none;border-color:var(--info-bd);}
.confirm-box{background:var(--bg2);border-radius:var(--r);padding:1.25rem;text-align:center;}
.confirm-msg{font-size:14px;color:var(--text);margin-bottom:1rem;line-height:1.6;}
.cbs{display:flex;gap:10px;justify-content:center;}
.kd{background:linear-gradient(135deg,#1a4a8a 0%,#0f6e56 100%);border-radius:var(--rl);padding:2rem 1.5rem;text-align:center;margin-bottom:1.25rem;}
.kt{font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:6px;}
.km{font-size:30px;font-weight:600;color:#fff;margin-bottom:4px;}
.ks{font-size:13px;color:rgba(255,255,255,0.75);margin-bottom:1.25rem;}
.kst{display:flex;justify-content:center;gap:24px;}
.ki{text-align:center;}.kn{font-size:20px;font-weight:600;color:#fff;}
.kl{font-size:11px;color:rgba(255,255,255,0.65);margin-top:2px;}
.kp{font-size:12px;color:rgba(255,255,255,0.6);margin-top:1rem;}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+80px);left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:200;}
.toast.show{opacity:1;}
.bsc{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:150;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.bsc.active{display:flex;}
.bscl{position:absolute;top:calc(env(safe-area-inset-top,16px)+14px);right:16px;padding:8px 18px;border-radius:var(--r);border:1px solid #555;background:transparent;color:#888;cursor:pointer;font-size:14px;font-family:inherit;}
.bsph{font-size:28px;font-weight:500;color:#333;}
.bstm{font-size:56px;font-weight:600;color:#333;line-height:1;}
.bspb{width:200px;height:3px;background:#1c1c1c;border-radius:2px;overflow:hidden;}
.bspf{height:100%;background:#333;width:0%;transition:width 0.1s linear;border-radius:2px;}
.bstot{font-size:13px;color:#333;}
.ci2{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:0.5px solid var(--bd);cursor:pointer;}
.ci2:last-child{border-bottom:none;}
.cil{display:flex;align-items:center;gap:12px;}
.cic{width:36px;height:36px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.clb{font-size:15px;font-weight:500;color:var(--text);}
.csb{font-size:12px;color:var(--text2);margin-top:2px;}
.car{font-size:18px;color:var(--text2);}
.cbk{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--info);cursor:pointer;margin-bottom:1.25rem;background:transparent;border:none;padding:0;font-family:inherit;}
.pfc{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem;}
.av{width:56px;height:56px;border-radius:50%;background:var(--info-bg);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;color:var(--info);flex-shrink:0;overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.lvb{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;}
.lv0{background:var(--bg2);color:var(--text2);}
.lv1{background:#e6f1fb;color:#185fa5;}
.lv2{background:#eaf3de;color:#3b6d11;}
.lv3{background:#faeeda;color:#854f0b;}
.lv4{background:linear-gradient(90deg,#7F77DD,#D4537E);color:#fff;}
.lpb{width:100%;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-top:6px;}
.lpf{height:100%;border-radius:3px;transition:width 0.5s ease;}
.ni{width:100%;padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg2);border:0.5px solid var(--bd);border-radius:var(--r);margin-top:8px;}
.ni:focus{outline:none;border-color:var(--info-bd);}
.pua{display:flex;align-items:center;gap:16px;padding:1rem;background:var(--bg2);border-radius:var(--r);margin-bottom:1rem;}
.ppv{width:64px;height:64px;border-radius:50%;background:var(--info-bg);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:500;color:var(--info);overflow:hidden;flex-shrink:0;cursor:pointer;border:2px solid var(--info-bd);}
.ppv img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.pur{display:flex;flex-direction:column;gap:8px;}
.pud{font-size:13px;color:var(--text2);line-height:1.5;}
.pub{display:flex;gap:8px;}
.pbtn{font-size:12px;padding:6px 14px;border-radius:var(--r);border:0.5px solid var(--info-bd);background:var(--info-bg);color:var(--info);cursor:pointer;font-family:inherit;}
.pdel{border-color:var(--danger-bd);background:transparent;color:var(--danger);}
.pdel:hover{background:var(--danger-bg);}
.is{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem;}
.it{font-size:15px;font-weight:500;color:var(--text);margin-bottom:4px;}
.id{font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.6;}
.istep{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;}
.isn{width:22px;height:22px;border-radius:50%;background:var(--info-bg);color:var(--info);font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.ist{font-size:13px;color:var(--text);line-height:1.6;}
.ist span{background:var(--bg2);padding:1px 6px;border-radius:4px;font-size:12px;}
.ibt{width:100%;margin-top:1rem;padding:12px;font-size:14px;font-weight:500;border-radius:var(--r);border:none;background:var(--info-bg);color:var(--info);cursor:pointer;font-family:inherit;}
.ibt:hover{opacity:0.85;}
.ibt:disabled{opacity:0.4;cursor:default;}
.nb{background:var(--bg2);border-radius:var(--rl);padding:2.5rem;text-align:center;}
/* 배너 */
.bna{margin-top:1.5rem;border-radius:var(--r);overflow:hidden;border:0.5px solid var(--bd);}
.bnimg{width:100%;height:80px;object-fit:cover;display:block;cursor:pointer;}
.bnph{width:100%;height:80px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text2);}
.bnf{padding:8px 12px;background:var(--bg);border-top:0.5px solid var(--bd);display:flex;justify-content:flex-end;}
.bnc{font-size:11px;color:var(--text2);cursor:pointer;text-decoration:underline;text-underline-offset:2px;}
/* 공지 / 칼럼 카드 */
.notice-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:1.25rem;margin-bottom:10px;}
.notice-badge{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;margin-bottom:8px;background:var(--info-bg);color:var(--info);}
.notice-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;}
.notice-content{font-size:14px;color:var(--text2);line-height:1.65;white-space:pre-wrap;word-break:break-all;}
.notice-date{font-size:12px;color:var(--text3);margin-top:10px;}
.col-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:1.25rem;margin-bottom:10px;cursor:pointer;}
.col-card:hover{border-color:var(--info-bd);}
.col-cat{font-size:11px;color:var(--info);font-weight:500;margin-bottom:6px;}
.col-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;}
.col-sub{font-size:13px;color:var(--text2);}
.col-date{font-size:11px;color:var(--text3);margin-top:8px;}
.col-detail-content{font-size:14px;color:var(--text2);line-height:1.75;white-space:pre-wrap;word-break:break-all;}
.loading-spin{text-align:center;padding:2rem;color:var(--text2);font-size:14px;}
#scc{position:fixed;left:-9999px;top:0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="app-header"><div class="app-title">호흡 훈련</div></div>
  <div class="tabs">
    <button class="tab active" onclick="showPage('train',this)">훈련</button>
    <button class="tab" onclick="showPage('calendar',this)">기록</button>
    <button class="tab" onclick="showPage('column',this)">칼럼</button>
    <button class="tab" onclick="showPage('config',this)">설정</button>
  </div>
  <div id="userBar" class="user-bar"></div>

  <!-- 훈련 탭 -->
  <div id="page-train" class="page active pp">
    <div class="tb">
      <div class="tbl" id="cfgSummary"></div>
      <div class="tbr">
        <button class="ib" id="cfgBtn" onclick="toggleSettings()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg>
          호흡 설정
        </button>
        <button class="ib" id="screenOffBtn" onclick="toggleScreenOff()">화면 끄기</button>
      </div>
    </div>
    <div class="sp" id="settingsPanel">
      <div class="mt">
        <button class="mb" id="modeProgram" onclick="setMode('program')">프로그램 모드</button>
        <button class="mb" id="modeManual" onclick="setMode('manual')">수동 모드</button>
      </div>
      <div id="settingsBody"></div>
      <div class="div"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';

const firebaseConfig = {
  apiKey: "AIzaSyAuKsnJixQbgwYudA6tpJyNO9IXmxHwg-0",
  authDomain: "breathing-app-f51cb.firebaseapp.com",
  projectId: "breathing-app-f51cb",
  storageBucket: "breathing-app-f51cb.firebasestorage.app",
  messagingSenderId: "967554724404",
  appId: "1:967554724404:web:0e5cc0ec05a6e92bba5061"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function eh(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(ts){if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');}

/* ── 배너 로드 ── */
async function loadBanner(){
  try{
    const snap=await getDocs(query(collection(db,'banners'),where('active','==',true),orderBy('createdAt','desc')));
    if(snap.empty){document.getElementById('bannerFallback').style.display='block';return;}
    const data=snap.docs[0].data();
    const sec=document.getElementById('bannerSection');
    const content=document.getElementById('bannerContent');
    const fb=document.getElementById('bannerFallback');
    content.innerHTML=data.url
      ? `<a href="${eh(data.url)}" target="_blank"><img class="bnimg" src="${data.imageUrl}" alt="배너"></a>`
      : `<img class="bnimg" src="${data.imageUrl}" alt="배너">`;
    sec.style.display='block';
    fb.style.display='none';
  }catch(e){document.getElementById('bannerFallback').style.display='block';}
}

/* ── 공지사항 로드 ── */
async function loadNotices(){
  try{
    const snap=await getDocs(query(collection(db,'notices'),orderBy('createdAt','desc')));
    window._notices=snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){window._notices=[];}
}

/* ── 칼럼 로드 ── */
async function loadColumns(){
  const list=document.getElementById('columnList');
  const loading=document.getElementById('columnLoadingMsg');
  try{
    const snap=await getDocs(query(collection(db,'columns'),orderBy('createdAt','desc')));
    loading.style.display='none';
    if(snap.empty){list.innerHTML='<div class="nb" style="margin-top:1rem;"><div style="font-size:14px;color:var(--text2);">등록된 칼럼이 없습니다</div></div>';return;}
    window._columns=snap.docs.map(d=>({id:d.id,...d.data()}));
    list.innerHTML=window._columns.map((c,i)=>`
      <div class="col-card" onclick="showColumnDetail(${i})">
        ${c.category?`<div class="col-cat">${eh(c.category)}</div>`:''}
        <div class="col-title">${eh(c.title)}</div>
        ${c.subtitle?`<div class="col-sub">${eh(c.subtitle)}</div>`:''}
        <div class="col-date">${fmtDate(c.createdAt)}</div>
      </div>`).join('');
  }catch(e){loading.textContent='불러오기 실패';}
}

window.showColumnDetail=function(i){
  const c=window._columns[i];
  document.getElementById('columnDetailContent').innerHTML=`
    ${c.category?`<div class="col-cat" style="margin-bottom:8px;">${eh(c.category)}</div>`:''}
    <div style="font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px;">${eh(c.title)}</div>
    ${c.subtitle?`<div style="font-size:14px;color:var(--text2);margin-bottom:12px;">${eh(c.subtitle)}</div>`:''}
    <div style="font-size:12px;color:var(--text3);margin-bottom:1.5rem;">${fmtDate(c.createdAt)}</div>
    <div class="col-detail-content">${eh(c.content)}</div>`;
  document.getElementById('columnListView').style.display='none';
  document.getElementById('columnDetailView').style.display='block';
};

window.closeColumnDetail=function(){
  document.getElementById('columnListView').style.display='block';
  document.getElementById('columnDetailView').style.display='none';
};

/* ── 설정 화면 공지사항 ── */
window.renderNoticesSub=function(){
  const notices=window._notices||[];
  if(!notices.length)return`<div class="nb"><div style="font-size:32px;margin-bottom:12px;">📢</div><div style="font-size:16px;font-weight:500;color:var(--text);margin-bottom:6px;">공지사항</div><div style="font-size:13px;color:var(--text2);line-height:1.6;">현재 등록된 공지사항이 없습니다.</div></div>`;
  const pinned=notices.filter(n=>n.pinned);
  const normal=notices.filter(n=>!n.pinned);
  const render=arr=>arr.map(n=>`<div class="notice-card">${n.pinned?'<div class="notice-badge">📌 중요</div>':''}<div class="notice-title">${eh(n.title)}</div><div class="notice-content">${eh(n.content)}</div><div class="notice-date">${fmtDate(n.createdAt)}</div></div>`).join('');
  return render(pinned)+render(normal);
};

// 초기 로드
loadBanner();
loadNotices();
loadColumns();
</script>

function calcLv(streak){const t=new Date();let last=999;for(let i=0;i<365;i++){const d=new Date(t);d.setDate(d.getDate()-i);const k=d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());if(records[k]&&records[k].length>0){last=i;break;}}

function getACtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(f,t,d,v){if(!soundOn)return;try{const ctx=getACtx();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=t||'sine';o.frequency.setValueAtTime(f,ctx.currentTime);g.gain.setValueAtTime(v||0.18,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d);o.start(ctx.currentTime);o.stop(ctx.currentTime+d);}catch(e){}}
function playPS(n){if(n==='들숨'){playTone(528,'sine',0.35,0.18);setTimeout(()=>playTone(660,'sine',0.25,0.1),180);}else if(n==='날숨'){playTone(396,'sine',0.4,0.16);setTimeout(()=>playTone(330,'sine',0.3,0.1),200);}else if(n==='멈춤'){playTone(440,'triangle',0.2,0.08);}}

function tick(ts){if(!running)return;if(!lastTs)lastTs=ts;const dt=(ts-lastTs)/1000;lastTs=ts;totalElapsed+=dt;const tSec=parseInt(document.getElementById('duration').value)*60;if(totalElapsed>=tSec){totalElapsed=tSec;finish();return;}const list=getPL();if(!list.length)return;phaseTime+=dt;const ci=phase%list.length;const cur=list[ci];const prog=Math.min(phaseTime/cur.dur,1);if(ci!==prevPI){prevPI=ci;playPS(cur.name);}const rem=Math.max(0,cur.dur-phaseTime);document.getElementById('circle').style.transform=`translate(-50%,-50%) scale(${getScale(cur.name,prog,cur.gi)})`;document.getElementById('circle').style.background=pGrads[cur.gi];document.getElementById('phaseLabel').textContent=cur.name;document.getElementById('timerLabel').textContent=Math.ceil(rem)+'초';document.getElementById('progressFill').style.width=((totalElapsed/tSec)*100)+'%';document.getElementById('elapsedDisplay').textContent=fmt(totalElapsed);document.getElementById('remainDisplay').textContent=fmt(tSec-totalElapsed);if(screenOff){document.getElementById('bs-phase').textContent=cur.name;document.getElementById('bs-timer').textContent=Math.ceil(rem);document.getElementById('bs-prog-fill').style.width=((totalElapsed/tSec)*100)+'%';document.getElementById('bs-total').textContent=fmt(totalElapsed)+' / '+fmt(tSec);}if(phaseTime>=cur.dur){phaseTime=0;phase++;if(phase>=list.length){phase=0;cyclesDone++;document.getElementById('cycleCount').textContent=cyclesDone;}}raf=requestAnimationFrame(tick);}

function renderCal(){const now=new Date();if(calYear===undefined){calYear=now.getFullYear();calMonth=now.getMonth();}document.getElementById('calTitle').textContent=calYear+'년 '+mNames[calMonth];const grid=document.getElementById('calGrid');grid.innerHTML='';dNames.forEach(d=>{const el=document.createElement('div');el.className='dn';el.textContent=d;grid.appendChild(el);});const fd=new Date(calYear,calMonth,1).getDay();const dim=new Date(calYear,calMonth+1,0).getDate();const tk=today();for(let i=0;i<fd;i++){const el=document.createElement('div');el.className='cc empty';grid.appendChild(el);}for(let d=1;d<=dim;d++){const key=dk(calYear,calMonth,d);const el=document.createElement('div');el.className='cc';if(key===tk)el.classList.add('today');if(key===selDate)el.classList.add('sel');const num=document.createElement('div');num.className='cn';num.textContent=d;el.appendChild(num);const hasR=records[key]&&records[key].length>0;const hasM=memos[key]&&memos[key].trim();if(hasR||hasM){const dr=document.createElement('div');dr.className='dr';if(hasR){const dot=document.createElement('div');dot.className='dot dg';dr.appendChild(dot);}if(hasM){const dot=document.createElement('div');dot.className='dot da';dr.appendChild(dot);}el.appendChild(dr);}el.addEventListener('click',()=>selD(key));grid.appendChild(el);}}
function selD(key){selDate=key;renderCal();document.getElementById('detailTitle').textContent=fl(key);const hasR=records[key]&&records[key].length>0;const hasM=memos[key]&&memos[key].trim();document.getElementById('xBtn').style.display=(hasR||hasM)?'flex':'none';renderDB(key);}
function renderDB(key){const body=document.getElementById('detailBody');const recs=records[key]||[];const memo=memos[key]||'';let html='';if(recs.length>0){html+='<div class="sl3">훈련 기록</div>';recs.forEach((r,i)=>{const lv=r.level?`<span class="bg bga" style="font-size:11px;padding:2px 6px;margin-left:4px;">${r.level}</span>`:'';html+=`<div class="ti"><div class="tl2"><div class="tn">${i+1}회차 · ${r.time}${lv}</div><div class="ts">들숨${r.inhale}/멈춤${r.holdIn}/날숨${r.exhale}/멈춤${r.holdOut}</div></div><div class="bgs"><span class="bg bbl">${r.duration}분</span><span class="bg bgn">${r.cycles}사이클</span></div></div>`;});}else{html+='<div class="em">훈련 기록이 없어요</div>';}html+='<div class="cdiv"></div><div class="sl3">메모</div>';if(memo){html+=`<div class="mb2">${eh(memo)}</div><div style="display:flex;gap:8px;justify-content:flex-end;"><button class="bsm bs2" style="display:flex;align-items:center;gap:5px;" onclick="shareRecordDay('${key}')"><svg style="width:12px;height:12px;" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="3" r="1.5"/><circle cx="12" cy="13" r="1.5"/><circle cx="3" cy="8" r="1.5"/><line x1="10.6" y1="3.9" x2="4.4" y2="7.1"/><line x1="10.6" y1="12.1" x2="4.4" y2="8.9"/></svg>공유</button><button class="bsm" onclick="editMemo('${key}')">수정</button><button class="bsm bd2" onclick="delMemo('${key}')">삭제</button></div>`;}else{html+=`<textarea class="mi" id="memoInput" placeholder="오늘의 컨디션, 소감, 목표 등을 자유롭게 적어보세요..."></textarea><div style="display:flex;justify-content:flex-end;"><button class="bsm bp" onclick="saveMemo('${key}')">저장</button></div>`;}body.innerHTML=html;}
function askDeleteDay(){if(!selDate)return;const recs=records[selDate]||[];const memo=memos[selDate]||'';let html='';if(recs.length>0){html+='<div class="sl3">훈련 기록</div>';recs.forEach((r,i)=>{html+=`<div class="ti"><div class="tl2"><div class="tn">${i+1}회차 · ${r.time}</div><div class="ts">들숨${r.inhale}/멈춤${r.holdIn}/날숨${r.exhale}/멈춤${r.holdOut}</div></div><div class="bgs"><span class="bg bbl">${r.duration}분</span><span class="bg bgn">${r.cycles}사이클</span></div></div>`;});html+='<div class="cdiv"></div>';}if(memo){html+='<div class="sl3">메모</div><div class="mb2" style="margin-bottom:1rem;">'+eh(memo)+'</div>';}html+=`<div class="confirm-box"><div class="confirm-msg"><strong>${fl(selDate)}</strong>의<br>훈련 기록을 삭제하시겠습니까?</div><div class="cbs"><button class="bd2" onclick="confirmDel()">네</button><button onclick="renderDB('${selDate}')">아니오</button></div></div>`;document.getElementById('detailBody').innerHTML=html;}
function confirmDel(){delete records[selDate];delete memos[selDate];selDate=null;save();renderCal();updateCalSt();document.getElementById('detailTitle').textContent='날짜를 선택해 주세요';document.getElementById('detailBody').innerHTML='<div class="em">날짜를 클릭하면 기록과 메모를 확인할 수 있어요</div>';document.getElementById('xBtn').style.display='none';}
function editMemo(key){const recs=records[key]||[];const memo=memos[key]||'';let html='';if(recs.length>0){html+='<div class="sl3">훈련 기록</div>';recs.forEach((r,i)=>{html+=`<div class="ti"><div class="tl2"><div class="tn">${i+1}회차 · ${r.time}</div><div class="ts">들숨${r.inhale}/멈춤${r.holdIn}/날숨${r.exhale}/멈춤${r.holdOut}</div></div><div class="bgs"><span class="bg bbl">${r.duration}분</span><span class="bg bgn">${r.cycles}사이클</span></div></div>`;});}html+='<div class="cdiv"></div><div class="sl3">메모</div>';html+=`<textarea class="mi" id="memoInput">${eh(memo)}</textarea><div style="display:flex;gap:8px;justify-content:flex-end;"><button class="bsm" onclick="renderDB('${key}')">취소</button><button class="bsm bp" onclick="saveMemo('${key}')">저장</button></div>`;document.getElementById('detailBody').innerHTML=html;}
function saveMemo(key){const inp=document.getElementById('memoInput');if(!inp)return;const v=inp.value.trim();if(v)memos[key]=v;else delete memos[key];save();const hasR=records[key]&&records[key].length>0;document.getElementById('xBtn').style.display=(hasR||v)?'flex':'none';renderCal();renderDB(key);}
function delMemo(key){delete memos[key];save();const hasR=records[key]&&records[key].length>0;document.getElementById('xBtn').style.display=hasR?'flex':'none';renderCal();renderDB(key);}
function changeMonth(dir){calMonth+=dir;if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}selDate=null;renderCal();document.getElementById('detailTitle').textContent='날짜를 선택해 주세요';document.getElementById('detailBody').innerHTML='<div class="em">날짜를 클릭하면 기록과 메모를 확인할 수 있어요</div>';document.getElementById('xBtn').style.display='none';}
function updateCalSt(){const keys=Object.keys(records);document.getElementById('totalDays').textContent=keys.length;let total=0;keys.forEach(k=>records[k].forEach(r=>total+=r.duration));document.getElementById('totalMinutes').textContent=Math.round(total);document.getElementById('streakDays').textContent=calcStreak();}

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
load();
document.getElementById('modeProgram').className='mb'+(curMode==='program'?' active':'');
document.getElementById('modeManual').className='mb'+(curMode==='manual'?' active':'');
renderSBody();updateSum();renderUserBar();
document.getElementById('circle').style.background=dGrad;
document.getElementById('remainDisplay').textContent=fmt(parseInt(document.getElementById('duration').value)*60);
</script>
</body>
</html>
