<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="호흡 훈련">
<meta name="theme-color" content="#1a4a8a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-152.png">
<title>호흡 훈련</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#ffffff;--bg2:#f5f5f5;--bg3:#eeeeee;
  --text:#1a1a1a;--text2:#666666;--text3:#999999;
  --info-bg:#e6f1fb;--info:#185fa5;
  --success-bg:#eaf3de;--success:#3b6d11;
  --warning-bg:#faeeda;--warning:#854f0b;
  --danger-bg:#fcebeb;--danger:#a32d2d;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
    --info-bg:#0c2540;--info:#85b7eb;
    --success-bg:#1a2e0a;--success:#97c459;
    --warning-bg:#2a1e00;--warning:#ef9f27;
    --danger-bg:#2a0a0a;--danger:#f09595;
    --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.22);
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;}
.wrap{padding:env(safe-area-inset-top,20px) 1rem 1.5rem;max-width:520px;margin:0 auto;position:relative;}
.app-header{display:flex;align-items:center;justify-content:center;padding:12px 0 4px;margin-bottom:1rem;}
.app-title{font-size:17px;font-weight:600;color:var(--text);}
.tabs{display:flex;margin-bottom:1.5rem;border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;}
.tab{flex:1;padding:9px;font-size:14px;font-weight:500;background:transparent;border:none;cursor:pointer;color:var(--text2);font-family:inherit;}
.tab.active{background:var(--info-bg);color:var(--info);}
.page{display:none;}.page.active{display:block;}
.settings-panel{background:var(--bg2);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem;display:none;}
.settings-panel.open{display:block;}
.mode-toggle{display:flex;margin-bottom:1rem;border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;}
.mode-btn{flex:1;padding:8px;font-size:13px;font-weight:500;background:transparent;border:none;cursor:pointer;color:var(--text2);font-family:inherit;}
.mode-btn.active{background:var(--info-bg);color:var(--info);}
.level-btns{display:flex;gap:6px;margin-bottom:1rem;}
.level-btn{flex:1;padding:8px;font-size:13px;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;}
.level-btn.active{background:var(--success-bg);color:var(--success);border-color:var(--success);}
.row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}.row:last-child{margin-bottom:0;}
.lbl{font-size:14px;color:var(--text2);width:82px;flex-shrink:0;}
.row input[type=range]{flex:1;accent-color:var(--info);}
.val{font-size:14px;font-weight:500;color:var(--text);width:44px;text-align:right;flex-shrink:0;}
.divider{height:0.5px;background:var(--border);margin:14px 0;}
.sound-row{display:flex;align-items:center;justify-content:space-between;}
.sound-label{font-size:14px;color:var(--text2);}
.sound-toggle{display:flex;border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.sound-toggle button{padding:6px 14px;font-size:12px;border:none;background:transparent;color:var(--text2);font-family:inherit;cursor:pointer;}
.sound-toggle button.on{background:var(--info-bg);color:var(--info);}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.top-bar-left{font-size:12px;color:var(--text2);flex:1;margin-right:8px;}
.top-bar-right{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.icon-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;font-size:13px;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;}
.icon-btn svg{width:14px;height:14px;flex-shrink:0;}
.icon-btn.active-cfg{border-color:var(--info);color:var(--info);background:var(--info-bg);}
.icon-btn.active-screen{border-color:var(--warning);color:var(--warning);background:var(--warning-bg);}
.circle-wrap{display:flex;flex-direction:column;align-items:center;padding:1.5rem 0 1rem;gap:14px;}
.c-outer{position:relative;width:260px;height:260px;}
.c-bg{width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(255,215,0,0.07)0%,transparent 70%);position:absolute;}
.c-inner{width:130px;height:130px;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(1);transition:transform 0.12s linear;}
.phase-lbl{font-size:26px;font-weight:600;color:var(--text);}
.time-lbl{font-size:15px;color:var(--text2);}
.prog-bar{width:100%;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-top:2px;}
.prog-fill{height:100%;background:var(--info);width:0%;transition:width 0.1s linear;border-radius:2px;}
.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:1rem 0 1.25rem;}
.stat{background:var(--bg2);border-radius:var(--radius);padding:12px;text-align:center;}
.stat-num{font-size:20px;font-weight:600;color:var(--text);}
.stat-txt{font-size:11px;color:var(--text2);margin-top:3px;}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
button{font-size:15px;padding:11px 26px;border-radius:var(--radius);border:0.5px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-family:inherit;}
.btn-primary{background:var(--info-bg);color:var(--info);border-color:var(--info);}
.btn-danger-txt{color:var(--danger);border-color:var(--danger);}
.btn-share{display:flex;align-items:center;gap:6px;background:var(--success-bg);color:var(--success);border-color:var(--success);}
.btn-sm{padding:6px 12px;font-size:12px;}
.summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.25rem;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.cal-title{font-size:16px;font-weight:600;color:var(--text);}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;margin-bottom:1.25rem;}
.day-name{font-size:11px;color:var(--text2);text-align:center;padding:4px 0;font-weight:500;}
.cal-cell{aspect-ratio:1;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:0.5px solid transparent;gap:2px;}
.cal-cell.empty{cursor:default;pointer-events:none;}
.cal-num{font-size:13px;color:var(--text);width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.cal-cell.today .cal-num{background:var(--info-bg);color:var(--info);}
.cal-cell.selected{border:1.5px solid var(--info);}
.dot-row{display:flex;gap:2px;}.dot{width:5px;height:5px;border-radius:50%;}
.dot-green{background:#639922;}.dot-amber{background:#BA7517;}
.detail-panel{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;}
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.detail-title{font-size:15px;font-weight:600;color:var(--text);}
.x-btn{width:28px;height:28px;border-radius:50%;border:0.5px solid var(--danger);background:transparent;color:var(--danger);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0;line-height:1;flex-shrink:0;}
.section-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px;letter-spacing:0.04em;text-transform:uppercase;}
.empty-msg{font-size:13px;color:var(--text2);padding:0.75rem 0;}
.train-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--border);}
.train-item:last-child{border-bottom:none;}
.train-left{display:flex;flex-direction:column;gap:3px;}
.train-name{font-size:13px;font-weight:500;color:var(--text);}
.train-sub{font-size:12px;color:var(--text2);}
.badges{display:flex;gap:6px;}
.badge{font-size:12px;padding:3px 9px;border-radius:var(--radius);}
.badge-blue{background:var(--info-bg);color:var(--info);}
.badge-green{background:var(--success-bg);color:var(--success);}
.badge-amber{background:var(--warning-bg);color:var(--warning);}
.cal-divider{height:0.5px;background:var(--border);margin:1rem 0;}
.memo-box{background:var(--bg2);border-radius:var(--radius);padding:1rem;margin-bottom:10px;font-size:14px;color:var(--text);line-height:1.6;white-space:pre-wrap;word-break:break-all;}
textarea.memo-input{width:100%;min-height:80px;padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);resize:none;line-height:1.5;margin-bottom:8px;}
.confirm-box{background:var(--bg2);border-radius:var(--radius);padding:1.25rem;text-align:center;}
.confirm-msg{font-size:14px;color:var(--text);margin-bottom:1rem;line-height:1.6;}
.confirm-btns{display:flex;gap:10px;justify-content:center;}
.complete-card{background:linear-gradient(135deg,#1a4a8a 0%,#0f6e56 100%);border-radius:var(--radius-lg);padding:2rem 1.5rem;text-align:center;margin-bottom:1.25rem;}
.complete-card-title{font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:6px;}
.complete-card-main{font-size:30px;font-weight:600;color:#fff;margin-bottom:4px;}
.complete-card-sub{font-size:13px;color:rgba(255,255,255,0.75);margin-bottom:1.25rem;}
.complete-card-stats{display:flex;justify-content:center;gap:24px;}
.cs-item{text-align:center;}.cs-num{font-size:20px;font-weight:600;color:#fff;}
.cs-lbl{font-size:11px;color:rgba(255,255,255,0.65);margin-top:2px;}
.complete-card-pattern{font-size:12px;color:rgba(255,255,255,0.6);margin-top:1rem;}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 20px);left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:200;}
.toast.show{opacity:1;}
.black-screen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:150;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.black-screen.active{display:flex;}
.bs-close{position:absolute;top:calc(env(safe-area-inset-top,20px) + 14px);right:16px;padding:8px 18px;border-radius:var(--radius);border:1px solid #555;background:transparent;color:#888;cursor:pointer;font-size:14px;font-family:inherit;}
.bs-phase{font-size:28px;font-weight:500;color:#333;}
.bs-timer{font-size:56px;font-weight:600;color:#333;line-height:1;}
.bs-progress{width:200px;height:3px;background:#1c1c1c;border-radius:2px;overflow:hidden;}
.bs-progress-fill{height:100%;background:#333;width:0%;transition:width 0.1s linear;border-radius:2px;}
.bs-total{font-size:13px;color:#333;}
#shareCardContainer{position:fixed;left:-9999px;top:0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="app-header"><div class="app-title">호흡 훈련</div></div>
  <div class="tabs">
    <button class="tab active" onclick="showPage('train',this)">훈련</button>
    <button class="tab" onclick="showPage('calendar',this)">기록</button>
  </div>

  <div id="page-train" class="page active">
    <div class="top-bar">
      <div class="top-bar-left" id="cfgSummary"></div>
      <div class="top-bar-right">
        <button class="icon-btn" id="cfgBtn" onclick="toggleSettings()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg>
          호흡 설정
        </button>
        <button class="icon-btn" id="screenOffBtn" onclick="toggleScreenOff()">화면 끄기</button>
      </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
      <div class="mode-toggle">
        <button class="mode-btn" id="modeProgram" onclick="setMode('program')">프로그램 모드</button>
        <button class="mode-btn" id="modeManual" onclick="setMode('manual')">수동 모드</button>
      </div>
      <div id="settingsBody"></div>
      <div class="divider"></div>
      <div class="row"><span class="lbl">훈련 시간</span><input type="range" id="duration" min="1" max="30" value="5" step="1" oninput="onDurationChange()"><span class="val" id="durationVal">5분</span></div>
      <div class="divider"></div>
      <div class="sound-row">
        <span class="sound-label">효과음</span>
        <div class="sound-toggle">
          <button class="on" id="soundOn" onclick="setSound(true)">켜기</button>
          <button class="off" id="soundOff" onclick="setSound(false)">끄기</button>
        </div>
      </div>
    </div>

    <div id="mainArea">
      <div class="circle-wrap">
        <div class="c-outer"><div class="c-bg"></div><div class="c-inner" id="circle"></div></div>
        <div class="phase-lbl" id="phaseLabel">준비</div>
        <div class="time-lbl" id="timerLabel">시작 버튼을 눌러주세요</div>
        <div class="prog-bar"><div class="prog-fill" id="progressFill"></div></div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-num" id="elapsedDisplay">0:00</div><div class="stat-txt">경과 시간</div></div>
        <div class="stat"><div class="stat-num" id="remainDisplay">5:00</div><div class="stat-txt">남은 시간</div></div>
        <div class="stat"><div class="stat-num" id="cycleCount">0</div><div class="stat-txt">완료 횟수</div></div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="startBtn" onclick="startStop()">시작</button>
        <button onclick="resetAll()">초기화</button>
      </div>
    </div>

    <div id="completeArea" style="display:none;">
      <div class="complete-card" id="completeCard">
        <div class="complete-card-title">호흡 훈련 완료</div>
        <div class="complete-card-main" id="cc-date"></div>
        <div class="complete-card-sub" id="cc-time"></div>
        <div class="complete-card-stats">
          <div class="cs-item"><div class="cs-num" id="cc-duration"></div><div class="cs-lbl">훈련 시간</div></div>
          <div class="cs-item"><div class="cs-num" id="cc-cycles"></div><div class="cs-lbl">완료 횟수</div></div>
        </div>
        <div class="complete-card-pattern" id="cc-pattern"></div>
      </div>
      <div class="btn-row">
        <button class="btn-share" onclick="shareTrainingResult()">
          <svg style="width:15px;height:15px;" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="3" r="1.5"/><circle cx="12" cy="13" r="1.5"/><circle cx="3" cy="8" r="1.5"/><line x1="10.6" y1="3.9" x2="4.4" y2="7.1"/><line x1="10.6" y1="12.1" x2="4.4" y2="8.9"/></svg>
          공유하기
        </button>
        <button class="btn-primary" onclick="resetAll()">다시 시작</button>
      </div>
    </div>
  </div>

  <div id="page-calendar" class="page">
    <div class="summary-grid">
      <div class="stat"><div class="stat-num" id="totalDays">0</div><div class="stat-txt">총 훈련일</div></div>
      <div class="stat"><div class="stat-num" id="totalMinutes">0</div><div class="stat-txt">총 훈련(분)</div></div>
      <div class="stat"><div class="stat-num" id="streakDays">0</div><div class="stat-txt">연속 달성일</div></div>
    </div>
    <div class="cal-header">
      <div class="cal-title" id="calTitle"></div>
      <div style="display:flex;gap:6px;">
        <button style="padding:6px 14px;font-size:15px;" onclick="changeMonth(-1)">&#8249;</button>
        <button style="padding:6px 14px;font-size:15px;" onclick="changeMonth(1)">&#8250;</button>
      </div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="detail-panel">
      <div class="detail-header">
        <div class="detail-title" id="detailTitle">날짜를 선택해 주세요</div>
        <button class="x-btn" id="xBtn" style="display:none;" onclick="askDeleteDay()">&#x2715;</button>
      </div>
      <div id="detailBody"><div class="empty-msg">날짜를 클릭하면 기록과 메모를 확인할 수 있어요</div></div>
    </div>
  </div>
</div>

<div class="black-screen" id="blackScreen">
  <button class="bs-close" onclick="exitBlackScreen()">화면 켜기</button>
  <div class="bs-phase" id="bs-phase">준비</div>
  <div class="bs-timer" id="bs-timer">-</div>
  <div class="bs-progress"><div class="bs-progress-fill" id="bs-prog-fill"></div></div>
  <div class="bs-total" id="bs-total">0:00 / 5:00</div>
</div>

<div id="shareCardContainer"></div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js');}

let running=false,raf=null,phase=0,phaseTime=0,totalElapsed=0,cyclesDone=0,lastTs=null;
let calYear,calMonth,selectedDate=null;
let records={},memos={};
let soundOn=true,audioCtx=null,prevPhaseIndex=-1,settingsOpen=false;
let screenOffMode=false,lastResult=null;
let currentMode='manual',currentLevel='beginner';
let presets={
  beginner:{inhale:3,holdIn:0,exhale:3,holdOut:0},
  intermediate:{inhale:6,holdIn:0,exhale:6,holdOut:0},
  advanced:{inhale:8,holdIn:4,exhale:8,holdOut:0},
  _manual:{inhale:4,holdIn:4,exhale:4,holdOut:0}
};

const phaseGrads=[
  'radial-gradient(circle,#FFD700 15%,rgba(255,200,0,0.45)58%,transparent 100%)',
  'radial-gradient(circle,#FFA500 15%,rgba(255,165,0,0.4)58%,transparent 100%)',
  'radial-gradient(circle,#F5C000 15%,rgba(245,192,0,0.35)58%,transparent 100%)',
  'radial-gradient(circle,#E89000 15%,rgba(232,144,0,0.3)58%,transparent 100%)'
];
const defaultGrad='radial-gradient(circle,#FFD700 15%,rgba(255,215,0,0.25)58%,transparent 100%)';
const dayNames=['일','월','화','수','목','금','토'];
const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const levelNames={beginner:'초급',intermediate:'중급',advanced:'고급'};
const LS='breath_app_';

function saveData(){try{localStorage.setItem(LS+'presets',JSON.stringify(presets));localStorage.setItem(LS+'mode',currentMode);localStorage.setItem(LS+'level',currentLevel);localStorage.setItem(LS+'dur',document.getElementById('duration').value);localStorage.setItem(LS+'records',JSON.stringify(records));localStorage.setItem(LS+'memos',JSON.stringify(memos));}catch(e){}}
function loadData(){
  try{
    const p=localStorage.getItem(LS+'presets');if(p)presets=JSON.parse(p);
    const m=localStorage.getItem(LS+'mode');if(m)currentMode=m;
    const l=localStorage.getItem(LS+'level');if(l)currentLevel=l;
    const d=localStorage.getItem(LS+'dur');if(d){document.getElementById('duration').value=d;document.getElementById('durationVal').textContent=d+'분';}
    const r=localStorage.getItem(LS+'records');if(r)records=JSON.parse(r);
    const memo=localStorage.getItem(LS+'memos');if(memo)memos=JSON.parse(memo);
  }catch(e){}
}

function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playTone(freq,type,dur,vol){if(!soundOn)return;try{const ctx=getAudioCtx();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=type||'sine';o.frequency.setValueAtTime(freq,ctx.currentTime);g.gain.setValueAtTime(vol||0.18,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.start(ctx.currentTime);o.stop(ctx.currentTime+dur);}catch(e){}}
function playPhaseSound(name){if(name==='들숨'){playTone(528,'sine',0.35,0.18);setTimeout(()=>playTone(660,'sine',0.25,0.1),180);}else if(name==='날숨'){playTone(396,'sine',0.4,0.16);setTimeout(()=>playTone(330,'sine',0.3,0.1),200);}else if(name==='멈춤'){playTone(440,'triangle',0.2,0.08);}}
function playFinishSound(){if(!soundOn)return;[0,150,300,500].forEach((d,i)=>{setTimeout(()=>playTone([528,660,784,1046][i],'sine',0.5,0.15),d);});}
function setSound(on){soundOn=on;document.getElementById('soundOn').className=on?'on':'off';document.getElementById('soundOff').className=on?'off':'on';if(on)try{getAudioCtx().resume();}catch(e){}}
function setMode(mode){currentMode=mode;document.getElementById('modeProgram').className='mode-btn'+(mode==='program'?' active':'');document.getElementById('modeManual').className='mode-btn'+(mode==='manual'?' active':'');renderSettingsBody();updateCfgSummary();saveData();}
function setLevel(level){currentLevel=level;['beginner','intermediate','advanced'].forEach(l=>{const el=document.getElementById('lvl-'+l);if(el)el.className='level-btn'+(l===level?' active':'');});renderLevelFields();updateCfgSummary();saveData();}
function renderSettingsBody(){
  const body=document.getElementById('settingsBody');
  if(currentMode==='program'){
    body.innerHTML=`<div class="level-btns"><button class="level-btn${currentLevel==='beginner'?' active':''}" id="lvl-beginner" onclick="setLevel('beginner')">초급</button><button class="level-btn${currentLevel==='intermediate'?' active':''}" id="lvl-intermediate" onclick="setLevel('intermediate')">중급</button><button class="level-btn${currentLevel==='advanced'?' active':''}" id="lvl-advanced" onclick="setLevel('advanced')">고급</button></div><div id="levelFields"></div>`;
    renderLevelFields();
  }else{
    const s=presets['_manual'];
    body.innerHTML=`<div class="row"><span class="lbl">들숨</span><input type="range" id="inhale" min="1" max="60" value="${s.inhale}" step="1" oninput="onManualChange()"><span class="val" id="inhaleVal">${s.inhale}초</span></div><div class="row"><span class="lbl">멈춤 (들숨)</span><input type="range" id="holdIn" min="0" max="60" value="${s.holdIn}" step="1" oninput="onManualChange()"><span class="val" id="holdInVal">${s.holdIn}초</span></div><div class="row"><span class="lbl">날숨</span><input type="range" id="exhale" min="1" max="60" value="${s.exhale}" step="1" oninput="onManualChange()"><span class="val" id="exhaleVal">${s.exhale}초</span></div><div class="row"><span class="lbl">멈춤 (날숨)</span><input type="range" id="holdOut" min="0" max="60" value="${s.holdOut}" step="1" oninput="onManualChange()"><span class="val" id="holdOutVal">${s.holdOut}초</span></div>`;
  }
}
function renderLevelFields(){const el=document.getElementById('levelFields');if(!el)return;const p=presets[currentLevel];el.innerHTML=`<div class="row"><span class="lbl">들숨</span><input type="range" id="p-inhale" min="1" max="60" value="${p.inhale}" step="1" oninput="onPresetChange('inhale',this.value)"><span class="val" id="p-inhaleVal">${p.inhale}초</span></div><div class="row"><span class="lbl">멈춤 (들숨)</span><input type="range" id="p-holdIn" min="0" max="60" value="${p.holdIn}" step="1" oninput="onPresetChange('holdIn',this.value)"><span class="val" id="p-holdInVal">${p.holdIn}초</span></div><div class="row"><span class="lbl">날숨</span><input type="range" id="p-exhale" min="1" max="60" value="${p.exhale}" step="1" oninput="onPresetChange('exhale',this.value)"><span class="val" id="p-exhaleVal">${p.exhale}초</span></div><div class="row"><span class="lbl">멈춤 (날숨)</span><input type="range" id="p-holdOut" min="0" max="60" value="${p.holdOut}" step="1" oninput="onPresetChange('holdOut',this.value)"><span class="val" id="p-holdOutVal">${p.holdOut}초</span></div>`;}
function onPresetChange(key,val){presets[currentLevel][key]=parseInt(val);const el=document.getElementById('p-'+key+'Val');if(el)el.textContent=val+'초';updateCfgSummary();saveData();}
function onManualChange(){['inhale','holdIn','exhale','holdOut'].forEach(k=>{const i=document.getElementById(k),v=document.getElementById(k+'Val');if(i&&v)v.textContent=i.value+'초';});presets['_manual']={inhale:parseInt(document.getElementById('inhale')?.value||4),holdIn:parseInt(document.getElementById('holdIn')?.value||0),exhale:parseInt(document.getElementById('exhale')?.value||4),holdOut:parseInt(document.getElementById('holdOut')?.value||0)};updateCfgSummary();saveData();}
function onDurationChange(){const v=document.getElementById('duration').value;document.getElementById('durationVal').textContent=v+'분';if(!running)document.getElementById('remainDisplay').textContent=fmt(v*60);updateCfgSummary();saveData();}
function getActiveSettings(){if(currentMode==='program'){const p=presets[currentLevel];return{inhale:p.inhale,holdIn:p.holdIn,exhale:p.exhale,holdOut:p.holdOut};}const get=id=>{const el=document.getElementById(id);return el?parseInt(el.value):(presets['_manual'][id]||4);};return{inhale:get('inhale'),holdIn:get('holdIn'),exhale:get('exhale'),holdOut:get('holdOut')};}
function updateCfgSummary(){const s=getActiveSettings();const d=document.getElementById('duration').value;let p='';if(currentMode==='program')p=`[${levelNames[currentLevel]}] `;p+=`들숨${s.inhale}`;if(s.holdIn>0)p+=` / 멈춤${s.holdIn}`;p+=` / 날숨${s.exhale}`;if(s.holdOut>0)p+=` / 멈춤${s.holdOut}`;p+=` · ${d}분`;document.getElementById('cfgSummary').textContent=p;}
function toggleSettings(){settingsOpen=!settingsOpen;document.getElementById('settingsPanel').className='settings-panel'+(settingsOpen?' open':'');document.getElementById('cfgBtn').className='icon-btn'+(settingsOpen?' active-cfg':'');}
function fmt(s){const m=Math.floor(s/60),ss=Math.floor(s%60);return m+':'+(ss<10?'0':'')+ss;}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function p2(n){return String(n).padStart(2,'0');}
function dateKey(y,m,d){return y+'-'+p2(m+1)+'-'+p2(d);}
function nowTime(){const n=new Date();return n.getHours()+':'+p2(n.getMinutes());}
function fmtLabel(key){const[y,m,d]=key.split('-');return y+'년 '+parseInt(m)+'월 '+parseInt(d)+'일';}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getPhaseList(){const s=getActiveSettings();return[{name:'들숨',dur:s.inhale,gi:0},{name:'멈춤',dur:s.holdIn,gi:1},{name:'날숨',dur:s.exhale,gi:2},{name:'멈춤',dur:s.holdOut,gi:3}].filter(x=>x.dur>0);}
function getScale(name,progress,gi){if(name==='들숨')return 1+progress*0.8;if(name==='날숨')return 1.8-progress*0.8;if(name==='멈춤')return gi===1?1.8:1.0;return 1.0;}
function tick(ts){
  if(!running)return;if(!lastTs)lastTs=ts;const dt=(ts-lastTs)/1000;lastTs=ts;totalElapsed+=dt;
  const totalSec=parseInt(document.getElementById('duration').value)*60;
  if(totalElapsed>=totalSec){totalElapsed=totalSec;finish();return;}
  const list=getPhaseList();if(!list.length)return;phaseTime+=dt;
  const curIdx=phase%list.length;const cur=list[curIdx];const prog=Math.min(phaseTime/cur.dur,1);
  if(curIdx!==prevPhaseIndex){prevPhaseIndex=curIdx;playPhaseSound(cur.name);}
  const remain=Math.max(0,cur.dur-phaseTime);
  const circle=document.getElementById('circle');
  circle.style.transform=`translate(-50%,-50%) scale(${getScale(cur.name,prog,cur.gi)})`;
  circle.style.background=phaseGrads[cur.gi];
  document.getElementById('phaseLabel').textContent=cur.name;
  document.getElementById('timerLabel').textContent=Math.ceil(remain)+'초';
  document.getElementById('progressFill').style.width=((totalElapsed/totalSec)*100)+'%';
  document.getElementById('elapsedDisplay').textContent=fmt(totalElapsed);
  document.getElementById('remainDisplay').textContent=fmt(totalSec-totalElapsed);
  if(screenOffMode){document.getElementById('bs-phase').textContent=cur.name;document.getElementById('bs-timer').textContent=Math.ceil(remain);document.getElementById('bs-prog-fill').style.width=((totalElapsed/totalSec)*100)+'%';document.getElementById('bs-total').textContent=fmt(totalElapsed)+' / '+fmt(totalSec);}
  if(phaseTime>=cur.dur){phaseTime=0;phase++;if(phase>=list.length){phase=0;cyclesDone++;document.getElementById('cycleCount').textContent=cyclesDone;}}
  raf=requestAnimationFrame(tick);
}
function saveRecord(){const key=todayStr();if(!records[key])records[key]=[];const s=getActiveSettings();records[key].push({time:nowTime(),duration:Math.round(totalElapsed/60*10)/10,cycles:cyclesDone,inhale:s.inhale,holdIn:s.holdIn,exhale:s.exhale,holdOut:s.holdOut,mode:currentMode,level:currentMode==='program'?levelNames[currentLevel]:null});saveData();}
function finish(){running=false;cancelAnimationFrame(raf);saveRecord();playFinishSound();document.getElementById('blackScreen').classList.remove('active');screenOffMode=false;document.getElementById('screenOffBtn').className='icon-btn';const s=getActiveSettings();lastResult={duration:Math.round(totalElapsed/60*10)/10,cycles:cyclesDone,...s,date:fmtLabel(todayStr()),time:nowTime(),mode:currentMode,level:currentMode==='program'?levelNames[currentLevel]:null};showCompleteCard();}
function showCompleteCard(){document.getElementById('mainArea').style.display='none';document.getElementById('completeArea').style.display='block';const r=lastResult;document.getElementById('cc-date').textContent=r.date;document.getElementById('cc-time').textContent=r.time+' 완료';document.getElementById('cc-duration').textContent=r.duration+'분';document.getElementById('cc-cycles').textContent=r.cycles+'회';let pat=r.level?`[${r.level}] `:'';pat+=`들숨 ${r.inhale}초`;if(r.holdIn>0)pat+=` · 멈춤 ${r.holdIn}초`;pat+=` · 날숨 ${r.exhale}초`;if(r.holdOut>0)pat+=` · 멈춤 ${r.holdOut}초`;document.getElementById('cc-pattern').textContent=pat;}
function startStop(){try{getAudioCtx().resume();}catch(e){}if(running){running=false;cancelAnimationFrame(raf);lastTs=null;document.getElementById('startBtn').textContent='계속';document.getElementById('phaseLabel').textContent='일시정지';if(screenOffMode)document.getElementById('blackScreen').classList.remove('active');}else{if(settingsOpen)toggleSettings();running=true;lastTs=null;prevPhaseIndex=-1;document.getElementById('startBtn').textContent='일시정지';if(screenOffMode)document.getElementById('blackScreen').classList.add('active');raf=requestAnimationFrame(tick);}}
function resetAll(){running=false;cancelAnimationFrame(raf);phase=0;phaseTime=0;totalElapsed=0;cyclesDone=0;lastTs=null;prevPhaseIndex=-1;document.getElementById('blackScreen').classList.remove('active');screenOffMode=false;document.getElementById('screenOffBtn').className='icon-btn';const totalSec=parseInt(document.getElementById('duration').value)*60;document.getElementById('mainArea').style.display='block';document.getElementById('completeArea').style.display='none';document.getElementById('phaseLabel').textContent='준비';document.getElementById('timerLabel').textContent='시작 버튼을 눌러주세요';document.getElementById('startBtn').textContent='시작';document.getElementById('cycleCount').textContent='0';document.getElementById('progressFill').style.width='0%';document.getElementById('elapsedDisplay').textContent='0:00';document.getElementById('remainDisplay').textContent=fmt(totalSec);document.getElementById('circle').style.transform='translate(-50%,-50%) scale(1)';document.getElementById('circle').style.background=defaultGrad;}
function toggleScreenOff(){screenOffMode=!screenOffMode;const btn=document.getElementById('screenOffBtn');if(screenOffMode){btn.className='icon-btn active-screen';if(running)document.getElementById('blackScreen').classList.add('active');}else{btn.className='icon-btn';document.getElementById('blackScreen').classList.remove('active');}}
function exitBlackScreen(){screenOffMode=false;document.getElementById('screenOffBtn').className='icon-btn';document.getElementById('blackScreen').classList.remove('active');}
async function shareTrainingResult(){const card=document.getElementById('completeCard');try{const canvas=await html2canvas(card,{scale:2,useCORS:true,backgroundColor:null});const blob=await new Promise(res=>canvas.toBlob(res,'image/png'));if(navigator.share&&navigator.canShare&&navigator.canShare({files:[new File([blob],'breath.png',{type:'image/png'})]})){await navigator.share({title:'호흡 훈련 완료!',text:`${lastResult.date} ${lastResult.duration}분 완료!`,files:[new File([blob],'breath.png',{type:'image/png'})]});}else{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='호흡훈련_완료.png';a.click();URL.revokeObjectURL(url);showToast('이미지가 저장됐어요!');}}catch(e){showToast('공유를 취소했어요');}}
async function shareRecordDay(key){const container=document.getElementById('shareCardContainer');const recs=records[key]||[];const memo=memos[key]||'';let recHtml='';recs.forEach((r,i)=>{const lv=r.level?` [${r.level}]`:'';recHtml+=`<div style="font-size:12px;color:rgba(255,255,255,0.85);margin-bottom:5px;">${i+1}회차${lv} · ${r.time} · ${r.duration}분 · ${r.cycles}사이클</div>`;});container.innerHTML=`<div id="rsc" style="background:linear-gradient(135deg,#1a4a8a,#0f6e56);border-radius:12px;padding:1.5rem;width:300px;font-family:sans-serif;"><div style="font-size:14px;font-weight:500;color:#fff;margin-bottom:10px;">${fmtLabel(key)}</div>${recHtml}${memo?`<div style="border-top:0.5px solid rgba(255,255,255,0.25);margin-top:10px;padding-top:10px;font-size:13px;color:#fff;line-height:1.55;">${escHtml(memo)}</div>`:''}</div>`;const card=document.getElementById('rsc');try{const canvas=await html2canvas(card,{scale:2,useCORS:true,backgroundColor:null});container.innerHTML='';const blob=await new Promise(res=>canvas.toBlob(res,'image/png'));if(navigator.share&&navigator.canShare&&navigator.canShare({files:[new File([blob],'record.png',{type:'image/png'})]})){await navigator.share({title:fmtLabel(key)+' 호흡 훈련',files:[new File([blob],'record.png',{type:'image/png'})]});}else{const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`호흡훈련_${key}.png`;a.click();URL.revokeObjectURL(url);showToast('이미지가 저장됐어요!');}}catch(e){container.innerHTML='';showToast('공유를 취소했어요');}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function showPage(id,el){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('page-'+id).classList.add('active');el.classList.add('active');if(id==='calendar'){renderCalendar();updateSummary();}}
function renderCalendar(){const now=new Date();if(calYear===undefined){calYear=now.getFullYear();calMonth=now.getMonth();}document.getElementById('calTitle').textContent=calYear+'년 '+monthNames[calMonth];const grid=document.getElementById('calGrid');grid.innerHTML='';dayNames.forEach(d=>{const el=document.createElement('div');el.className='day-name';el.textContent=d;grid.appendChild(el);});const firstDay=new Date(calYear,calMonth,1).getDay();const daysInMonth=new Date(calYear,calMonth+1,0).getDate();const todayKey=todayStr();for(let i=0;i<firstDay;i++){const el=document.createElement('div');el.className='cal-cell empty';grid.appendChild(el);}for(let d=1;d<=daysInMonth;d++){const key=dateKey(calYear,calMonth,d);const el=document.createElement('div');el.className='cal-cell';if(key===todayKey)el.classList.add('today');if(key===selectedDate)el.classList.add('selected');const num=document.createElement('div');num.className='cal-num';num.textContent=d;el.appendChild(num);const hasR=records[key]&&records[key].length>0;const hasM=memos[key]&&memos[key].trim();if(hasR||hasM){const dr=document.createElement('div');dr.className='dot-row';if(hasR){const dot=document.createElement('div');dot.className='dot dot-green';dr.appendChild(dot);}if(hasM){const dot=document.createElement('div');dot.className='dot dot-amber';dr.appendChild(dot);}el.appendChild(dr);}el.addEventListener('click',()=>selectDate(key));grid.appendChild(el);}}
function selectDate(key){selectedDate=key;renderCalendar();document.getElementById('detailTitle').textContent=fmtLabel(key);const hasR=records[key]&&records[key].length>0;const hasM=memos[key]&&memos[key].trim();document.getElementById('xBtn').style.display=(hasR||hasM)?'flex':'none';renderDetailBody(key);}
function renderDetailBody(key){const body=document.getElementById('detailBody');const recs=records[key]||[];const memo=memos[key]||'';let html='';if(recs.length>0){html+='<div class="section-label">훈련 기록</div>';recs.forEach((r,i)=>{const lvBadge=r.level?`<span class="badge badge-amber" style="font-size:11px;padding:2px 6px;margin-left:4px;">${r.level}</span>`:'';html+=`<div class="train-item"><div class="train-left"><div class="train-name">${i+1}회차 · ${r.time}${lvBadge}</div><div class="train-sub">들숨${r.inhale} / 멈춤${r.holdIn} / 날숨${r.exhale} / 멈춤${r.holdOut}</div></div><div class="badges"><span class="badge badge-blue">${r.duration}분</span><span class="badge badge-green">${r.cycles}사이클</span></div></div>`;});}else{html+='<div class="empty-msg">훈련 기록이 없어요</div>';}html+='<div class="cal-divider"></div><div class="section-label">메모</div>';if(memo){html+=`<div class="memo-box">${escHtml(memo)}</div><div style="display:flex;gap:8px;justify-content:flex-end;"><button class="btn-sm btn-share" style="display:flex;align-items:center;gap:5px;" onclick="shareRecordDay('${key}')"><svg style="width:12px;height:12px;" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="3" r="1.5"/><circle cx="12" cy="13" r="1.5"/><circle cx="3" cy="8" r="1.5"/><line x1="10.6" y1="3.9" x2="4.4" y2="7.1"/><line x1="10.6" y1="12.1" x2="4.4" y2="8.9"/></svg>공유</button><button class="btn-sm" onclick="startEditMemo('${key}')">수정</button><button class="btn-sm btn-danger-txt" onclick="deleteMemo('${key}')">삭제</button></div>`;}else{html+=`<textarea class="memo-input" id="memoInput" placeholder="오늘의 컨디션, 소감, 목표 등을 자유롭게 적어보세요..."></textarea><div style="display:flex;justify-content:flex-end;"><button class="btn-sm btn-primary" onclick="saveMemo('${key}')">저장</button></div>`;}body.innerHTML=html;}
function askDeleteDay(){if(!selectedDate)return;const recs=records[selectedDate]||[];const memo=memos[selectedDate]||'';let html='';if(recs.length>0){html+='<div class="section-label">훈련 기록</div>';recs.forEach((r,i)=>{html+=`<div class="train-item"><div class="train-left"><div class="train-name">${i+1}회차 · ${r.time}</div><div class="train-sub">들숨${r.inhale} / 멈춤${r.holdIn} / 날숨${r.exhale} / 멈춤${r.holdOut}</div></div><div class="badges"><span class="badge badge-blue">${r.duration}분</span><span class="badge badge-green">${r.cycles}사이클</span></div></div>`;});html+='<div class="cal-divider"></div>';}if(memo){html+='<div class="section-label">메모</div><div class="memo-box" style="margin-bottom:1rem;">'+escHtml(memo)+'</div>';}html+=`<div class="confirm-box"><div class="confirm-msg"><strong>${fmtLabel(selectedDate)}</strong>의<br>훈련 기록을 삭제하시겠습니까?</div><div class="confirm-btns"><button class="btn-danger-txt" onclick="confirmDeleteDay()">네</button><button onclick="renderDetailBody('${selectedDate}')">아니오</button></div></div>`;document.getElementById('detailBody').innerHTML=html;}
function confirmDeleteDay(){delete records[selectedDate];delete memos[selectedDate];selectedDate=null;saveData();renderCalendar();updateSummary();document.getElementById('detailTitle').textContent='날짜를 선택해 주세요';document.getElementById('detailBody').innerHTML='<div class="empty-msg">날짜를 클릭하면 기록과 메모를 확인할 수 있어요</div>';document.getElementById('xBtn').style.display='none';}
function startEditMemo(key){const recs=records[key]||[];const memo=memos[key]||'';let html='';if(recs.length>0){html+='<div class="section-label">훈련 기록</div>';recs.forEach((r,i)=>{html+=`<div class="train-item"><div class="train-left"><div class="train-name">${i+1}회차 · ${r.time}</div><div class="train-sub">들숨${r.inhale} / 멈춤${r.holdIn} / 날숨${r.exhale} / 멈춤${r.holdOut}</div></div><div class="badges"><span class="badge badge-blue">${r.duration}분</span><span class="badge badge-green">${r.cycles}사이클</span></div></div>`;});}html+='<div class="cal-divider"></div><div class="section-label">메모</div>';html+=`<textarea class="memo-input" id="memoInput">${escHtml(memo)}</textarea><div style="display:flex;gap:8px;justify-content:flex-end;"><button class="btn-sm" onclick="renderDetailBody('${key}')">취소</button><button class="btn-sm btn-primary" onclick="saveMemo('${key}')">저장</button></div>`;document.getElementById('detailBody').innerHTML=html;}
function saveMemo(key){const input=document.getElementById('memoInput');if(!input)return;const val=input.value.trim();if(val)memos[key]=val;else delete memos[key];saveData();const hasR=records[key]&&records[key].length>0;document.getElementById('xBtn').style.display=(hasR||val)?'flex':'none';renderCalendar();renderDetailBody(key);}
function deleteMemo(key){delete memos[key];saveData();const hasR=records[key]&&records[key].length>0;document.getElementById('xBtn').style.display=hasR?'flex':'none';renderCalendar();renderDetailBody(key);}
function changeMonth(dir){calMonth+=dir;if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}selectedDate=null;renderCalendar();document.getElementById('detailTitle').textContent='날짜를 선택해 주세요';document.getElementById('detailBody').innerHTML='<div class="empty-msg">날짜를 클릭하면 기록과 메모를 확인할 수 있어요</div>';document.getElementById('xBtn').style.display='none';}
function updateSummary(){const keys=Object.keys(records);document.getElementById('totalDays').textContent=keys.length;let total=0;keys.forEach(k=>records[k].forEach(r=>total+=r.duration));document.getElementById('totalMinutes').textContent=Math.round(total);let streak=0;const td=new Date();for(let i=0;i<365;i++){const d=new Date(td);d.setDate(d.getDate()-i);const k=d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());if(records[k])streak++;else break;}document.getElementById('streakDays').textContent=streak;}

loadData();
document.getElementById('modeProgram').className='mode-btn'+(currentMode==='program'?' active':'');
document.getElementById('modeManual').className='mode-btn'+(currentMode==='manual'?' active':'');
renderSettingsBody();
updateCfgSummary();
document.getElementById('circle').style.background=defaultGrad;
document.getElementById('remainDisplay').textContent=fmt(parseInt(document.getElementById('duration').value)*60);
</script>
