<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="호흡 훈련">
<meta name="theme-color" content="#1a4a8a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-152.png">
<title>호흡 훈련</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
/* ── 화이트 테마 ── */
body[data-theme="white"]{
  --bg:#fff;--bg2:#f5f5f5;--bg3:#eee;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --info-bg:#e6f1fb;--info:#185fa5;--info-bd:#85b7eb;
  --success-bg:#eaf3de;--success:#3b6d11;--success-bd:#97c459;
  --warning-bg:#faeeda;--warning:#854f0b;--warning-bd:#ef9f27;
  --danger-bg:#fcebeb;--danger:#a32d2d;--danger-bd:#f09595;
  --bd:rgba(0,0,0,0.12);--bd2:rgba(0,0,0,0.22);
}
/* ── 블랙 테마 ── */
body[data-theme="black"]{
  --bg:#0a0a0a;--bg2:#1a1a1a;--bg3:#242424;
  --text:#d0d0d0;--text2:#888;--text3:#555;
  --info-bg:#0f1e2e;--info:#6aaad4;--info-bd:#2a5a8a;
  --success-bg:#0d1f0d;--success:#6aaa6a;--success-bd:#2a5a2a;
  --warning-bg:#1f1500;--warning:#c8902a;--warning-bd:#6a4a0a;
  --danger-bg:#1f0d0d;--danger:#c87070;--danger-bd:#6a2a2a;
  --bd:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.18);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;overflow-x:hidden;transition:background 0.2s,color 0.2s;}
.wrap{padding:env(safe-area-inset-top,16px) 1rem 0;max-width:520px;margin:0 auto;position:relative;}
.app-title-bar{text-align:center;padding:10px 0 6px;margin-bottom:10px;}
.app-title{font-size:17px;font-weight:700;color:var(--text);}
.tabs{display:flex;margin-bottom:10px;border:0.5px solid var(--bd2);border-radius:8px;overflow:hidden;}
.tab{flex:1;padding:8px 4px;font-size:13px;font-weight:500;background:transparent;border:none;cursor:pointer;color:var(--text2);font-family:inherit;}
.tab.active{background:var(--info-bg);color:var(--info);}
.tab:hover:not(.active){background:var(--bg2);}
.user-bar{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:8px;padding:8px 12px;margin-bottom:14px;}
.uba{width:28px;height:28px;border-radius:50%;background:var(--info-bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--info);flex-shrink:0;overflow:hidden;}
.uba img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.ubn{font-size:13px;font-weight:500;color:var(--text);}
.ubd{width:1px;height:14px;background:var(--bd2);flex-shrink:0;}
.ubi{display:flex;flex-direction:column;align-items:center;}
.ubv{font-size:13px;font-weight:500;color:var(--text);}
.ubl{font-size:10px;color:var(--text2);}
.ubb{font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;}
.page{display:none;}.page.active{display:block;}
.pp{padding-bottom:1.5rem;}
.sp{background:var(--bg2);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem;display:none;}
.sp.open{display:block;}
.mt{display:flex;margin-bottom:1rem;border:0.5px solid var(--bd2);border-radius:8px;overflow:hidden;}
.mb{flex:1;padding:7px;font-size:13px;font-weight:500;background:transparent;border:none;cursor:pointer;color:var(--text2);font-family:inherit;}
.mb.active{background:var(--info-bg);color:var(--info);}
.pg{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;}
.pc{background:var(--bg);border:0.5px solid var(--bd);border-radius:8px;padding:10px 6px;text-align:center;cursor:pointer;}
.pc:hover,.pc.act{border-color:var(--info-bd);background:var(--info-bg);}
.pcn{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.pc.act .pcn{color:var(--info);}
.pcs{font-size:10px;color:var(--text2);}
.pc.act .pcs{color:var(--info);}
.pe{background:var(--bg3);border-radius:8px;padding:1rem;margin-top:10px;}
.pni{font-size:13px;padding:6px 10px;background:var(--bg);border:0.5px solid var(--bd);border-radius:8px;color:var(--text);font-family:inherit;width:100%;margin-bottom:10px;}
.pni:focus{outline:none;border-color:var(--info-bd);}
.row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}.row:last-child{margin-bottom:0;}
.lbl{font-size:14px;color:var(--text2);width:82px;flex-shrink:0;}
.row input[type=range]{flex:1;accent-color:var(--info);}
.val{font-size:14px;font-weight:500;color:var(--text);width:44px;text-align:right;flex-shrink:0;}
.divl{height:0.5px;background:var(--bd);margin:14px 0;}
.sndrow{display:flex;align-items:center;justify-content:space-between;}
.sndlbl{font-size:14px;color:var(--text2);}
.sndtgl{display:flex;border:0.5px solid var(--bd);border-radius:8px;overflow:hidden;}
.sndtgl button{padding:5px 14px;font-size:12px;border:none;background:transparent;color:var(--text2);font-family:inherit;cursor:pointer;}
.sndtgl button.on{background:var(--info-bg);color:var(--info);}
.tb{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.tbl{font-size:12px;color:var(--text2);flex:1;margin-right:8px;}
.tbr{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.ib{display:flex;align-items:center;gap:5px;padding:7px 12px;font-size:13px;border-radius:8px;border:0.5px solid var(--bd);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;}
.ib:hover{background:var(--bg2);}
.ib svg{width:14px;height:14px;flex-shrink:0;}
.ib.acfg{border-color:var(--info-bd);color:var(--info);background:var(--info-bg);}
.ib.ascr{border-color:var(--warning-bd);color:var(--warning);background:var(--warning-bg);}
.cw{display:flex;flex-direction:column;align-items:center;padding:1.25rem 0 0.75rem;gap:12px;}
.co{position:relative;width:220px;height:220px;}
.cbg{width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,215,0,0.07)0%,transparent 70%);position:absolute;}
.ci{width:110px;height:110px;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(1);transition:transform 0.12s linear;}
.phl{font-size:24px;font-weight:600;color:var(--text);}
.tl{font-size:14px;color:var(--text2);}
.pb{width:100%;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-top:2px;}
.pf{height:100%;background:var(--info);width:0%;transition:width 0.1s linear;border-radius:2px;}
.sg{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:0.75rem 0 1rem;}
.st2{background:var(--bg2);border-radius:8px;padding:10px;text-align:center;}
.sn{font-size:18px;font-weight:600;color:var(--text);}
.sl2{font-size:11px;color:var(--text2);margin-top:2px;}
.br{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
button{font-size:14px;padding:10px 24px;border-radius:8px;border:0.5px solid var(--bd);background:transparent;color:var(--text);cursor:pointer;font-family:inherit;}
button:hover{background:var(--bg2);}
button:active{transform:scale(0.98);}
.bp{background:var(--info-bg);color:var(--info);border-color:var(--info-bd);}
.bp:hover{opacity:0.85;}
.bdng{color:var(--danger);border-color:var(--danger-bd);}
.bdng:hover{background:var(--danger-bg);}
.bshr{display:flex;align-items:center;gap:6px;background:var(--success-bg);color:var(--success);border-color:var(--success-bd);}
.bshr:hover{opacity:0.85;}
.bsm{padding:6px 12px;font-size:12px;}
.smg{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px;}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.ct{font-size:16px;font-weight:600;color:var(--text);}
.cg{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;margin-bottom:14px;}
.dn{font-size:11px;color:var(--text2);text-align:center;padding:4px 0;font-weight:500;}
.cc{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:0.5px solid transparent;gap:2px;}
.cc:hover{background:var(--bg2);}
.cc.empty{cursor:default;pointer-events:none;}
.cn{font-size:13px;color:var(--text);width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.cc.today .cn{background:var(--info-bg);color:var(--info);}
.cc.sel{border:1.5px solid var(--info-bd);}
.dr{display:flex;gap:2px;}.dot{width:5px;height:5px;border-radius:50%;}
.dg{background:#639922;}.da{background:#BA7517;}
.dp{background:var(--bg);border:0.5px solid var(--bd);border-radius:12px;padding:1.25rem;}
.dph{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.dpt{font-size:15px;font-weight:600;color:var(--text);}
.xb{width:28px;height:28px;border-radius:50%;border:0.5px solid var(--danger-bd);background:transparent;color:var(--danger);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0;line-height:1;flex-shrink:0;}
.sl3{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px;letter-spacing:0.04em;}
.em{font-size:13px;color:var(--text2);padding:0.75rem 0;}
.ti{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--bd);}
.ti:last-child{border-bottom:none;}
.tl2{display:flex;flex-direction:column;gap:3px;}
.tn{font-size:13px;font-weight:500;color:var(--text);}
.ts{font-size:12px;color:var(--text2);}
.bgs{display:flex;gap:6px;}
.bg{font-size:12px;padding:3px 9px;border-radius:8px;}
.bbl{background:var(--info-bg);color:var(--info);}
.bgn{background:var(--success-bg);color:var(--success);}
.bga{background:var(--warning-bg);color:var(--warning);}
.cdiv{height:0.5px;background:var(--bd);margin:1rem 0;}
.mb2{background:var(--bg2);border-radius:8px;padding:1rem;margin-bottom:10px;font-size:14px;color:var(--text);line-height:1.6;white-space:pre-wrap;word-break:break-all;}
textarea.mi{width:100%;min-height:80px;padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg2);border:0.5px solid var(--bd);border-radius:8px;resize:none;line-height:1.5;margin-bottom:8px;}
textarea.mi:focus{outline:none;border-color:var(--info-bd);}
.cfmb{background:var(--bg2);border-radius:8px;padding:1.25rem;text-align:center;}
.cfmm{font-size:14px;color:var(--text);margin-bottom:1rem;line-height:1.6;}
.cfmbs{display:flex;gap:10px;justify-content:center;}
.kd{background:linear-gradient(135deg,#1a4a8a 0%,#0f6e56 100%);border-radius:12px;padding:2rem 1.5rem;text-align:center;margin-bottom:1.25rem;}
.kt{font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:6px;}
.km{font-size:30px;font-weight:600;color:#fff;margin-bottom:4px;}
.ks{font-size:13px;color:rgba(255,255,255,0.75);margin-bottom:1.25rem;}
.kst{display:flex;justify-content:center;gap:24px;}
.ki{text-align:center;}.kn{font-size:20px;font-weight:600;color:#fff;}
.kl{font-size:11px;color:rgba(255,255,255,0.65);margin-top:2px;}
.kp{font-size:12px;color:rgba(255,255,255,0.6);margin-top:1rem;}
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+80px);left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;font-size:13px;padding:10px 20px;border-radius:20px;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;z-index:200;}
.toast.show{opacity:1;}
.bsc{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:150;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.bsc.active{display:flex;}
.bsph{font-size:28px;font-weight:500;color:#333;}
.bstm{font-size:56px;font-weight:600;color:#333;line-height:1;}
.bspb{width:200px;height:3px;background:#1c1c1c;border-radius:2px;overflow:hidden;}
.bspf{height:100%;background:#333;width:0%;transition:width 0.1s linear;border-radius:2px;}
.bstot{font-size:13px;color:#333;}
.bs-close{margin-top:8px;padding:9px 24px;border-radius:8px;border:1px solid #444;background:transparent;color:#666;cursor:pointer;font-size:14px;font-family:inherit;}
.bs-close:hover{border-color:#666;color:#999;}
.ci2{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:0.5px solid var(--bd);cursor:pointer;}
.ci2:last-child{border-bottom:none;}
.cil{display:flex;align-items:center;gap:12px;}
.cic{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.clb{font-size:15px;font-weight:500;color:var(--text);}
.csb{font-size:12px;color:var(--text2);margin-top:2px;}
.car{font-size:18px;color:var(--text2);}
.cbk{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--info);cursor:pointer;margin-bottom:1.25rem;background:transparent;border:none;padding:0;font-family:inherit;}
.pfc{background:var(--bg);border:0.5px solid var(--bd);border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.av{width:56px;height:56px;border-radius:50%;background:var(--info-bg);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;color:var(--info);flex-shrink:0;overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.lvb{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;}
.lv0{background:var(--bg2);color:var(--text2);}
.lv1{background:#e6f1fb;color:#185fa5;}
.lv2{background:#eaf3de;color:#3b6d11;}
.lv3{background:#faeeda;color:#854f0b;}
.lv4{background:linear-gradient(90deg,#7F77DD,#D4537E);color:#fff;}
.lpb{width:100%;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-top:6px;}
.lpf{height:100%;border-radius:3px;transition:width 0.5s ease;}
.ni{width:100%;padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg2);border:0.5px solid var(--bd);border-radius:8px;margin-top:8px;}
.ni:focus{outline:none;border-color:var(--info-bd);}
.pua{display:flex;align-items:center;gap:16px;padding:1rem;background:var(--bg2);border-radius:8px;margin-bottom:1rem;}
.ppv{width:64px;height:64px;border-radius:50%;background:var(--info-bg);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:500;color:var(--info);overflow:hidden;flex-shrink:0;cursor:pointer;border:2px solid var(--info-bd);}
.ppv img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.pur{display:flex;flex-direction:column;gap:8px;}
.pud{font-size:13px;color:var(--text2);line-height:1.5;}
.pub{display:flex;gap:8px;}
.pbtn{font-size:12px;padding:6px 14px;border-radius:8px;border:0.5px solid var(--info-bd);background:var(--info-bg);color:var(--info);cursor:pointer;font-family:inherit;}
.pdel{border-color:var(--danger-bd);background:transparent;color:var(--danger);}
.pdel:hover{background:var(--danger-bg);}
.is{background:var(--bg);border:0.5px solid var(--bd);border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.it{font-size:15px;font-weight:500;color:var(--text);margin-bottom:4px;}
.id{font-size:13px;color:var(--text2);margin-bottom:1rem;line-height:1.6;}
.istep{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;}
.isn{width:22px;height:22px;border-radius:50%;background:var(--info-bg);color:var(--info);font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.ist{font-size:13px;color:var(--text);line-height:1.6;}
.ist span{background:var(--bg2);padding:1px 6px;border-radius:4px;font-size:12px;}
.ibt{width:100%;margin-top:1rem;padding:12px;font-size:14px;font-weight:500;border-radius:8px;border:none;background:var(--info-bg);color:var(--info);cursor:pointer;font-family:inherit;}
.ibt:disabled{opacity:0.4;cursor:default;}
.nb{background:var(--bg2);border-radius:12px;padding:2.5rem;text-align:center;}
/* 배너 */
.bna{margin-top:1.5rem;overflow:hidden;position:relative;}
.bnimg{width:100%;height:80px;object-fit:cover;display:block;cursor:pointer;}
.bnph{width:100%;height:80px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text2);}
.bnf{padding:8px 0;display:flex;justify-content:flex-end;}
.bnc{font-size:11px;color:var(--text2);cursor:pointer;text-decoration:underline;}
.bn-dots{display:flex;justify-content:center;gap:6px;padding:6px 0;}
.bn-dot{width:6px;height:6px;border-radius:50%;background:var(--bd2);cursor:pointer;transition:background 0.2s;}
.bn-dot.act-dot{background:var(--info);}
/* 공지 */
.notice-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:12px;padding:1.25rem;margin-bottom:10px;}
.notice-pin{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;margin-bottom:8px;background:var(--info-bg);color:var(--info);}
.notice-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;}
.notice-body{font-size:14px;color:var(--text2);line-height:1.7;white-space:pre-wrap;word-break:break-all;}
.notice-date{font-size:11px;color:var(--text3);margin-top:10px;}
/* 칼럼 */
.col-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:12px;padding:1.25rem;margin-bottom:10px;cursor:pointer;}
.col-card:hover{border-color:var(--info-bd);}
.col-cat{font-size:11px;color:var(--info);font-weight:500;margin-bottom:6px;}
.col-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;}
.col-sub{font-size:13px;color:var(--text2);}
.col-date{font-size:11px;color:var(--text3);margin-top:8px;}
.col-body{font-size:14px;color:var(--text2);line-height:1.75;white-space:pre-wrap;word-break:break-all;}
/* 테마 */
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.theme-card{border:0.5px solid var(--bd);border-radius:12px;padding:1rem;cursor:pointer;text-align:center;}
.theme-card:hover{border-color:var(--info-bd);}
.theme-card.act-t{border:2px solid var(--info-bd);background:var(--info-bg);}
.tp{width:100%;height:60px;border-radius:8px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;}
.tp-w{background:#fff;border:1px solid #ddd;}
.tp-b{background:#0a0a0a;}
.tp-circle{width:26px;height:26px;border-radius:50%;background:radial-gradient(circle,#FFD700,rgba(255,215,0,0.3));}
.tp-bar{width:36px;height:4px;border-radius:2px;}
.tp-w .tp-bar{background:#e0e0e0;}
.tp-b .tp-bar{background:#333;}
.theme-name{font-size:14px;font-weight:500;color:var(--text);}
.theme-desc{font-size:12px;color:var(--text2);margin-top:3px;}
.spin{text-align:center;padding:2rem;color:var(--text2);font-size:14px;}
#scc{position:fixed;left:-9999px;top:0;}
/* ── 효과음/배경음 칩 ── */
.sound-section{margin-top:10px;}
.sound-section-label{font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500;}
.sound-chips{display:flex;flex-wrap:wrap;gap:7px;}
.sound-chip{padding:6px 14px;font-size:12px;border-radius:20px;border:0.5px solid var(--bd2);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;}
.sound-chip:hover{background:var(--bg2);}
.sound-chip.act-chip{background:var(--info-bg);color:var(--info);border-color:var(--info-bd);}
/* ── 공지 카드 목록 ── */
.notice-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:12px;padding:1.25rem;margin-bottom:10px;cursor:pointer;}
.notice-card:hover{border-color:var(--info-bd);}
.notice-card-preview{display:flex;align-items:center;gap:10px;}

/* ── Firebase 데이터 로드 ── */
let _banners = [];
let _bannerIdx = 0;
let _bannerTimer = null;

async function loadBanner() {
  try {
    const snap = await db.collection('banners').where('active','==',true).get();
    if (snap.empty) return;
    _banners = snap.docs
      .sort((a,b) => (b.data().createdAt?.seconds||0) - (a.data().createdAt?.seconds||0))
      .map(d => d.data())
      .filter(d => d.imageUrl);
    if (!_banners.length) return;
    _bannerIdx = 0;
    renderBanner();
    if (_banners.length > 1) startBannerTimer();
  } catch(e) { console.log('배너 로드 실패:', e.message); }
}

function renderBanner() {
  const data = _banners[_bannerIdx];
  if (!data) return;
  const wrap = document.getElementById('bannerWrap');
  const dots = _banners.length > 1
    ? `<div class="bn-dots">${_banners.map((_,i) => `<span class="bn-dot${i===_bannerIdx?' act-dot':''}" onclick="goBanner(${i})"></span>`).join('')}</div>`
    : '';
  const imgHtml = data.url
    ? `<a href="${data.url}" target="_blank" rel="noopener"><img class="bnimg" src="${data.imageUrl}" alt="배너"></a>`
    : `<img class="bnimg" src="${data.imageUrl}" alt="배너">`;
  wrap.innerHTML = imgHtml + dots + `<div class="bnf"><span class="bnc">제휴 문의</span></div>`;
}

function startBannerTimer(){
  if(_bannerTimer)clearInterval(_bannerTimer);
  const dur=(_banners[_bannerIdx]?.duration||10)*1000;
  _bannerTimer=setInterval(()=>{
    _bannerIdx=(_bannerIdx+1)%_banners.length;
    renderBanner();
    startBannerTimer(); // 다음 배너의 duration으로 재시작
  },dur);
}

function goBanner(i) {
  _bannerIdx = i;
  renderBanner();
  if(_banners.length>1)startBannerTimer();
}

let _notices = [];
async function loadNotices() {
  try {
    const snap = await db.collection('notices').orderBy('createdAt','desc').get();
    _notices = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) { console.log('공지 로드 실패:', e); }
}

        <div class="col-date">${fmtDate(c.createdAt)}</div>
      </div>`).join('');
  } catch(e) {
    spinner.textContent = '불러오기 실패. 네트워크를 확인해주세요.';
    console.log('칼럼 로드 실패:', e);
  }
}

function showColDetail(i) {
  const c = _columns[i];
  document.getElementById('colDetailContent').innerHTML = `
    ${c.category ? `<div class="col-cat" style="margin-bottom:8px;">${eh(c.category)}</div>` : ''}

    <div style="font-size:12px;color:var(--text3);margin-bottom:1.5rem;">${fmtDate(c.createdAt)}</div>
    <div class="col-body" style="line-height:1.8;">${renderContent(c.content)}</div>`;
  document.getElementById('colListView').style.display = 'none';
  document.getElementById('colDetailView').style.display = 'block';
}
function closeColDetail() {
  document.getElementById('colListView').style.display = 'block';

function fmtDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
}

/* ── 본문 렌더링 (이미지 태그 지원) ──
   관리자에서 [img:https://...] 형식으로 삽입하면 이미지로 표시
   또는 한 줄 전체가 http로 시작하는 이미지 URL이면 자동 인식 */
function renderContent(text) {
  if (!text) return '';
  const lines = text.split('\n');
  return lines.map(line => {
    const trimmed = line.trim();
    // [img:URL] 형식
    const imgTag = trimmed.match(/^\[img:(https?:\/\/[^\]]+)\]$/);
    if (imgTag) {
      return `<img src="${imgTag[1]}" alt="이미지" style="width:100%;border-radius:8px;margin:8px 0;display:block;">`;
    }
    // 단독 이미지 URL (jpg, png, gif, webp로 끝나는)
    if (/^https?:\/\/.+\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(trimmed)) {
      return `<img src="${trimmed}" alt="이미지" style="width:100%;border-radius:8px;margin:8px 0;display:block;">`;
    }
    // 일반 텍스트
    return `<span>${eh(line)}</span>`;
  }).join('<br>');
}

function p2(n){return String(n).padStart(2,'0');}
function dk(y,m,d){return y+'-'+p2(m+1)+'-'+p2(d);}
function nt(){const n=new Date();return n.getHours()+':'+p2(n.getMinutes());}

function calcLv(s){const t=new Date();let last=999;for(let i=0;i<365;i++){const d=new Date(t);d.setDate(d.getDate()-i);const k=d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());if(records[k]&&records[k].length>0){last=i;break;}}
  if(last>=7)return{lv:0,name:'레벨 0',desc:'훈련을 재개해보세요',next:10,fill:'#888780',cls:'lv0'};
  if(s>=80)return{lv:4,name:'레벨 4',desc:'마스터!',next:null,fill:'linear-gradient(90deg,#7F77DD,#D4537E)',cls:'lv4'};

}

function getACtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function setSfxVol(v){
  sfxVolume=parseInt(v);
  const el=document.getElementById('sfxVolVal');if(el)el.textContent=v;

function setBgmVol(v){
  bgmVolume=parseInt(v);
  const el=document.getElementById('bgmVolVal');if(el)el.textContent=v;
  if(bgmGain)bgmGain.gain.setValueAtTime(bgmVolume/100*0.1,audioCtx.currentTime);
  save();
}
function tone(f,t,d,v){
  try{const ctx=getACtx();const o=ctx.createOscillator();const g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);o.type=t;o.frequency.setValueAtTime(f,ctx.currentTime);
  const vol=v*(sfxVolume/100);
  g.gain.setValueAtTime(vol,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+d);
  o.start(ctx.currentTime);o.stop(ctx.currentTime+d);}catch(e){}
}
function playSfxTone(sfxId,phaseName){
  if(!soundOn)return;
  const m={
    basic:{i:[528,'sine',0.35,0.18,660,'sine',0.25,0.1,180],e:[396,'sine',0.4,0.16,330,'sine',0.3,0.1,200],h:[440,'triangle',0.2,0.08]},
    soft: {i:[440,'sine',0.4,0.12,550,'sine',0.3,0.08,200],e:[330,'sine',0.5,0.1,264,'sine',0.35,0.07,220],h:[396,'sine',0.25,0.07]},
    deep: {i:[220,'sine',0.4,0.2,330,'sine',0.3,0.12,150],e:[165,'sine',0.45,0.18,220,'sine',0.3,0.1,180],h:[196,'triangle',0.25,0.1]},
    bell: {i:[784,'sine',0.3,0.15,1046,'sine',0.2,0.08,100],e:[659,'sine',0.35,0.12,523,'sine',0.25,0.08,120],h:[698,'triangle',0.2,0.08]},
    whisper:{i:[528,'triangle',0.5,0.08,660,'triangle',0.4,0.06,200],e:[396,'triangle',0.55,0.07,330,'triangle',0.4,0.05,230],h:[440,'sine',0.3,0.05]}
  };
  const s=m[sfxId]||m.basic;
  const k=phaseName==='들숨'?'i':phaseName==='날숨'?'e':'h';
  const p=s[k];
  tone(p[0],p[1],p[2],p[3]);
  if(p.length>4)setTimeout(()=>tone(p[4],p[5],p[6],p[7]),p[8]);
}

function startBgm(){
  if(!bgmOn||bgmNode)return;
  try{
    const ctx=getACtx();ctx.resume();
    bgmGain=ctx.createGain();
    bgmGain.gain.setValueAtTime(bgmVolume/100*0.1,ctx.currentTime);
    bgmGain.connect(ctx.destination);
    const cfg={forest:{f:[180,240,320,430],t:'sine'},rain:{f:[250,500,750,1000],t:'sawtooth'},ocean:{f:[60,90,120,150],t:'sine'},white:{f:[300,700,1100,1500],t:'sawtooth'},zen:{f:[136,272,204,340],t:'sine'}};
    const c=cfg[curBgm]||cfg.forest;
    bgmNode=c.f.map((f,i)=>{
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.type=c.t;
      o.frequency.setValueAtTime(f,ctx.currentTime);
      o.detune.setValueAtTime((i%2?3:-3)*(i+1),ctx.currentTime);
      g.gain.setValueAtTime(0.015,ctx.currentTime);
      o.connect(g);g.connect(bgmGain);o.start();return o;
    });
  }catch(e){console.log('bgm err',e);}
}

}function getPL(){const s=getAS();return[{name:'들숨',dur:s.inhale,gi:0},{name:'멈춤',dur:s.holdIn,gi:1},{name:'날숨',dur:s.exhale,gi:2},{name:'멈춤',dur:s.holdOut,gi:3}].filter(x=>x.dur>0);}

let countdownRaf=null;
function startCountdown(cb){
  let n=5;
  const circle=document.getElementById('circle');
  const phaseLabel=document.getElementById('phaseLabel');
  const timerLabel=document.getElementById('timerLabel');
  phaseLabel.textContent='준비';
  timerLabel.textContent='잠시 후 시작됩니다';
  document.getElementById('startBtn').textContent='취소';

  function showNum(num){
    const old=document.getElementById('cdNum');
    if(old)old.remove();
    if(num<=0){
      countdownRaf=null; // 카운트다운 완료 시 반드시 초기화
      cb();
      return;
    }
    const el=document.createElement('div');
    el.id='cdNum';el.className='countdown-num';
    el.textContent=num;
    circle.parentNode.appendChild(el);
    // 원 크기 애니메이션
    circle.style.transform=`translate(-50%,-50%) scale(${1+num*0.1})`;
    circle.style.background='radial-gradient(circle,#FFD700 15%,rgba(255,200,0,0.45)58%,transparent 100%)';
    // 효과음 (기본 볼륨의 30%)
    if(soundOn)try{const ctx=getACtx();const o=ctx.createOscillator();const g=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(num===1?880:660,ctx.currentTime);g.gain.setValueAtTime(0.15*0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.3);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+0.3);}catch(e){}
    n--;
    countdownRaf=setTimeout(()=>showNum(n),1000);
  }
  showNum(n);
}

function cancelCountdown(){
  if(countdownRaf){clearTimeout(countdownRaf);countdownRaf=null;}
  const el=document.getElementById('cdNum');if(el)el.remove();
  document.getElementById('circle').style.transform='translate(-50%,-50%) scale(1)';
  document.getElementById('circle').style.background=dGrad;
  // 훈련 중이 아닐 때만 초기 상태로 복원
  if(!running && !isPaused){
    document.getElementById('phaseLabel').textContent='준비';
    document.getElementById('timerLabel').textContent='시작 버튼을 눌러주세요';
    document.getElementById('startBtn').textContent='시작';
  }
}

function startStop(){
  try{getACtx().resume();}catch(e){}

  // 카운트다운 중 → 취소
  if(countdownRaf){ cancelCountdown(); return; }

  if(running){
    // ── 일시정지 ──
    running=false;
    isPaused=true;
    cancelAnimationFrame(raf);
    raf=null;
    lastTs=null;
    releaseWakeLock();
    stopBgm();
    document.getElementById('startBtn').textContent='계속';
    document.getElementById('phaseLabel').textContent='일시정지';
    if(screenOff) document.getElementById('blackScreen').classList.remove('active');
    logEvent('training_paused',{elapsed:Math.round(totalElapsed)});

  } else if(isPaused){
    // ── 일시정지 → 재개 (카운트다운 없이) ──
    isPaused=false;
    running=true;
    lastTs=null;
    requestWakeLock();
    startBgm();
    document.getElementById('startBtn').textContent='일시정지';
    if(screenOff) document.getElementById('blackScreen').classList.add('active');
    raf=requestAnimationFrame(tick);

  } else {
    // ── 처음 시작 → 5초 카운트다운 ──
    if(settingsOpen) cancelSettings();
    prevPI=-1;
    startCountdown(()=>{
      const el=document.getElementById('cdNum'); if(el) el.remove();
      running=true;
      lastTs=null;
      isPaused=false;
      requestWakeLock();
      startBgm();
      document.getElementById('startBtn').textContent='일시정지';
      if(screenOff) document.getElementById('blackScreen').classList.add('active');
      raf=requestAnimationFrame(tick);
      const s=getAS();
      logEvent('training_start',{
        mode:curMode,
        preset:curMode==='program'?presets[selPI>=0?selPI:0].name:'manual',
        inhale:s.inhale, exhale:s.exhale,
        duration:parseInt(document.getElementById('duration').value)
      });
    });
  }
}

  try{
    const canvas=await html2canvas(card,{scale:2,useCORS:true,backgroundColor:null});
    const blob=await new Promise(res=>canvas.toBlob(res,'image/png'));
    const file=new File([blob],'호흡훈련.png',{type:'image/png'});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({title:'호흡 훈련 완료!',text:shareText,files:[file]});
    } else if(navigator.share){
      await navigator.share({title:'호흡 훈련 완료!',text:shareText,url:appUrl});
    } else {
      // 공유 API 없으면 텍스트 클립보드 복사
      await navigator.clipboard.writeText(shareText);
      showToast('공유 내용이 복사됐어요!');
    }
  }catch(e){
    if(e.name!=='AbortError')showToast('공유를 취소했어요');
  }
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function showPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(el)el.classList.add('active');
  else{document.querySelectorAll('.tab').forEach(t=>{if(t.getAttribute('onclick')&&t.getAttribute('onclick').includes("'"+id+"'"))t.classList.add('active');});}
  document.getElementById('userBar').style.display=(id==='config')?'none':'flex';
  curPage=id;save();
  logEvent('page_view',{page:id});
  if(id==='calendar'){renderCal();updateCalSt();}
  if(id==='config'){document.getElementById('configMain').style.display='block';document.getElementById('configSub').style.display='none';renderConfigMain();}
}
function renderCal(){const now=new Date();if(calYear===undefined){calYear=now.getFullYear();calMonth=now.getMonth();}document.getElementById('calTitle').textContent=calYear+'년 '+mNames[calMonth];const grid=document.getElementById('calGrid');grid.innerHTML='';dNames.forEach(d=>{const el=document.createElement('div');el.className='dn';el.textContent=d;grid.appendChild(el);});const fd=new Date(calYear,calMonth,1).getDay();const dim=new Date(calYear,calMonth+1,0).getDate();const tk=today();for(let i=0;i<fd;i++){const el=document.createElement('div');el.className='cc empty';grid.appendChild(el);}for(let d=1;d<=dim;d++){const key=dk(calYear,calMonth,d);const el=document.createElement('div');el.className='cc';if(key===tk)el.classList.add('today');if(key===selDate)el.classList.add('sel');const num=document.createElement('div');num.className='cn';num.textContent=d;el.appendChild(num);const hasR=records[key]&&records[key].length>0;const hasM=memos[key]&&memos[key].trim();if(hasR||hasM){const dr=document.createElement('div');dr.className='dr';if(hasR){const dot=document.createElement('div');dot.className='dot dg';dr.appendChild(dot);}if(hasM){const dot=document.createElement('div');dot.className='dot da';dr.appendChild(dot);}el.appendChild(dr);}el.addEventListener('click',()=>selD(key));grid.appendChild(el);}}
function selD(key){selDate=key;renderCal();document.getElementById('detailTitle').textContent=fl(key);const hasR=records[key]&&records[key].length>0;const hasM=memos[key]&&memos[key].trim();document.getElementById('xBtn').style.display=(hasR||hasM)?'flex':'none';renderDB(key);}
function renderDB(key){const body=document.getElementById('detailBody');const recs=records[key]||[];const memo=memos[key]||'';let html='';if(recs.length>0){html+='<div class="sl3">훈련 기록</div>';recs.forEach((r,i)=>{const lv=r.level?`<span class="bg bga" style="font-size:11px;padding:2px 6px;margin-left:4px;">${r.level}</span>`:'';html+=`<div class="ti"><div class="tl2"><div class="tn">${i+1}회차 · ${r.time}${lv}</div><div class="ts">들숨${r.inhale}/멈춤${r.holdIn}/날숨${r.exhale}/멈춤${r.holdOut}</div></div><div class="bgs"><span class="bg bbl">${r.duration}분</span><span class="bg bgn">${r.cycles}사이클</span></div></div>`;});}else{html+='<div class="em">훈련 기록이 없어요</div>';}html+='<div class="cdiv"></div><div class="sl3">메모</div>';if(memo){html+=`<div class="mb2">${eh(memo)}</div><div style="display:flex;gap:8px;justify-content:flex-end;"><button class="bsm" onclick="editMemo('${key}')">수정</button><button class="bsm bdng" onclick="delMemo('${key}')">삭제</button></div>`;}else{html+=`<textarea class="mi" id="memoInput" placeholder="오늘의 컨디션, 소감을 적어보세요..."></textarea><div style="display:flex;justify-content:flex-end;"><button class="bsm bp" onclick="saveMemo('${key}')">저장</button></div>`;}body.innerHTML=html;}
function askDeleteDay(){if(!selDate)return;document.getElementById('detailBody').innerHTML=`<div class="cfmb"><div class="cfmm"><strong>${fl(selDate)}</strong>의<br>훈련 기록을 삭제하시겠습니까?</div><div class="cfmbs"><button class="bdng" onclick="confirmDel()">네</button><button onclick="selD('${selDate}')">아니오</button></div></div>`;}
function confirmDel(){delete records[selDate];delete memos[selDate];selDate=null;save();renderCal();updateCalSt();document.getElementById('detailTitle').textContent='날짜를 선택해 주세요';document.getElementById('detailBody').innerHTML='<div class="em">날짜를 클릭하면 기록과 메모를 확인할 수 있어요</div>';document.getElementById('xBtn').style.display='none';}
function editMemo(key){const memo=memos[key]||'';document.getElementById('detailBody').innerHTML=`<textarea class="mi" id="memoInput">${eh(memo)}</textarea><div style="display:flex;gap:8px;justify-content:flex-end;"><button class="bsm" onclick="renderDB('${key}')">취소</button><button class="bsm bp" onclick="saveMemo('${key}')">저장</button></div>`;}
function saveMemo(key){const i=document.getElementById('memoInput');if(!i)return;const v=i.value.trim();if(v)memos[key]=v;else delete memos[key];save();const hasR=records[key]&&records[key].length>0;document.getElementById('xBtn').style.display=(hasR||v)?'flex':'none';renderCal();renderDB(key);}
function delMemo(key){delete memos[key];save();renderCal();renderDB(key);}
function changeMonth(dir){calMonth+=dir;if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}selDate=null;renderCal();document.getElementById('detailTitle').textContent='날짜를 선택해 주세요';document.getElementById('detailBody').innerHTML='<div class="em">날짜를 클릭하면 기록과 메모를 확인할 수 있어요</div>';document.getElementById('xBtn').style.display='none';}
function updateCalSt(){const keys=Object.keys(records);document.getElementById('totalDays').textContent=keys.length;let total=0;keys.forEach(k=>records[k].forEach(r=>total+=r.duration));document.getElementById('totalMinutes').textContent=Math.round(total);document.getElementById('streakDays').textContent=calcStreak();}

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

/* ── Wake Lock ── */
let wakeLock=null;
async function requestWakeLock(){if(!('wakeLock'in navigator))return;try{wakeLock=await navigator.wakeLock.request('screen');}catch(e){}}
async function releaseWakeLock(){if(wakeLock){try{await wakeLock.release();}catch(e){}wakeLock=null;}}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&running)requestWakeLock();});

load();
applyTheme(curTheme);
document.getElementById('modeProgram').className='mb'+(curMode==='program'?' active':'');
document.getElementById('modeManual').className='mb'+(curMode==='manual'?' active':'');
renderSBody();updateSum();renderUserBar();
document.getElementById('circle').style.background=dGrad;
document.getElementById('remainDisplay').textContent=fmt(parseInt(document.getElementById('duration').value)*60);

/* 효과음 UI 초기화 */
setSound(soundOn);
renderSfxChips();
document.getElementById('sfxVol').value=sfxVolume;
document.getElementById('sfxVolVal').textContent=sfxVolume;
/* 배경음 UI 초기화 */
document.getElementById('bgmOn').className=bgmOn?'on':'off';
document.getElementById('bgmOff').className=bgmOn?'off':'on';
document.getElementById('bgmSection').style.display=bgmOn?'block':'none';
renderBgmChips();
document.getElementById('bgmVol').value=bgmVolume;
document.getElementById('bgmVolVal').textContent=bgmVolume;

/* 새로고침 시 마지막 페이지 복원 */
if(curPage&&curPage!=='train'){showPage(curPage,null);}

/* Firebase 데이터 비동기 로드 */
Promise.all([loadBanner(),loadNotices(),loadColumns(),loadGuide()]).then(()=>{
  renderUserBar();
}).catch(e=>console.log('Firebase 로드 오류:',e));

/* ── Analytics: 앱 실행 이벤트 ── */
logEvent('app_open');

/* ── Analytics: PWA 설치 이벤트 ── */
window.addEventListener('appinstalled', ()=>{
  logEvent('pwa_installed');
});
